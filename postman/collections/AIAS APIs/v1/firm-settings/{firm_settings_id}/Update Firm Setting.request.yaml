$kind: http-request
description: |-
  Update an existing firm setting record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{firm_settings_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/firm-settings/:firm_settings_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: firm_settings_id
    value: "{{firm_settings_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "firm_name": "Pinnacle Audit Partners LLP",
      "registration_number": "LLP-2020-001",
      "address": "Upper Hill, Nairobi",
      "phone": "+254700000000",
      "email": "info@pinnacleaudit.test",
      "country_id": "{{country_id}}",
      "default_audit_standard_id": "{{audit_standard_id}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "firm_name": {
          "type": "string"
        },
        "registration_number": {
          "type": "string"
        },
        "address": {
          "type": "string"
        },
        "phone": {
          "type": "string"
        },
        "email": {
          "type": "string",
          "format": "email"
        },
        "country_id": {
          "type": "string"
        },
        "default_audit_standard_id": {
          "type": "string"
        }
      }
    }
order: 2000
