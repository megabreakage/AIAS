$kind: http-request
description: |-
  Create a new firm setting record.

  On success the `identifier` of the new record is automatically saved to `{{firm_settings_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/firm-settings"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "firm_name": "Pinnacle Audit Partners LLP",
      "registration_number": "LLP-2020-001",
      "address": "Upper Hill, Nairobi",
      "phone": "+254700000000",
      "email": "info@pinnacleaudit.test",
      "country_id": "{{country_id}}",
      "default_audit_standard_id": "{{audit_standard_id}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "firm_name": {
          "type": "string"
        },
        "registration_number": {
          "type": "string"
        },
        "address": {
          "type": "string"
        },
        "phone": {
          "type": "string"
        },
        "email": {
          "type": "string",
          "format": "email"
        },
        "country_id": {
          "type": "string"
        },
        "default_audit_standard_id": {
          "type": "string"
        }
      }
    }
order: 2000
