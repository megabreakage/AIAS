$kind: http-request
description: |-
  Create a new report record.

  On success the `identifier` of the new record is automatically saved to `{{report_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/reports"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "report_type": "audit_report",
      "title": "Independent Auditor's Report — FY2025",
      "period_from": "2025-01-01",
      "period_to": "2025-12-31"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "report_type": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "period_from": {
          "type": "string",
          "format": "date"
        },
        "period_to": {
          "type": "string",
          "format": "date"
        }
      }
    }
order: 2000
