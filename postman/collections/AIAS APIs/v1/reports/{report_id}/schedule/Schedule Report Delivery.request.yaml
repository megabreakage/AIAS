$kind: http-request
description: Schedule Report Delivery
url: "{{baseUrl}}/v1/reports/:report_id/schedule"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  - key: report_id
    value: "{{report_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        }
      }
    }
order: 1000
