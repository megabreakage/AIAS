$kind: http-request
description: |-
  Update an existing report record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{report_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/reports/:report_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: report_id
    value: "{{report_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "report_type": "audit_report",
      "title": "Independent Auditor's Report — FY2025",
      "period_from": "2025-01-01",
      "period_to": "2025-12-31"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "report_type": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "period_from": {
          "type": "string",
          "format": "date"
        },
        "period_to": {
          "type": "string",
          "format": "date"
        }
      }
    }
order: 2000
