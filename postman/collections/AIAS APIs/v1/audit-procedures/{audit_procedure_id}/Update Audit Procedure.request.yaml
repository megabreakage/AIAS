$kind: http-request
description: |-
  Update an existing audit procedure record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{audit_procedure_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/audit-procedures/:audit_procedure_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: audit_procedure_id
    value: "{{audit_procedure_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_plan_id": "{{audit_plan_id}}",
      "title": "Agree revenue per ledger to source documents",
      "description": "Obtain the revenue ledger and agree totals to the trial balance",
      "procedure_type": "substantive",
      "assigned_to": "{{user_id}}",
      "due_date": "2026-01-25"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_plan_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "procedure_type": {
          "type": "string"
        },
        "assigned_to": {
          "type": "string"
        },
        "due_date": {
          "type": "string",
          "format": "date"
        }
      }
    }
order: 2000
