$kind: http-request
description: |-
  Retrieve a single regulation framework by its `identifier` string.

  Replace `{{regulation_framework_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/regulation-frameworks/:regulation_framework_id"
method: GET
pathVariables:
  - key: regulation_framework_id
    value: "{{regulation_framework_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
