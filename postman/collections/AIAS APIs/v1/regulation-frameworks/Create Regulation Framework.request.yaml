$kind: http-request
description: |-
  Create a new regulation framework record.

  On success the `identifier` of the new record is automatically saved to `{{regulation_framework_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/regulation-frameworks"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "SOX",
      "code": "SOX",
      "description": "Sarbanes-Oxley Act — US public company accounting reform",
      "jurisdiction": "United States",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "code": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "jurisdiction": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
