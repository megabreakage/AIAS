$kind: http-request
description: |-
  Create a new compliance evidence record.

  On success the `identifier` of the new record is automatically saved to `{{compliance_evidence_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/compliance-evidence"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "compliance_requirement_id": "{{compliance_requirement_id}}",
      "title": "Signed CEO Certification Letter",
      "description": "CEO certification signed and filed with SEC",
      "evidence_date": "2026-03-25",
      "collected_by": "{{user_id}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "compliance_requirement_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "evidence_date": {
          "type": "string",
          "format": "date"
        },
        "collected_by": {
          "type": "string"
        }
      }
    }
order: 2000
