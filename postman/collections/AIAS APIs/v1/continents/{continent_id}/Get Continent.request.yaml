$kind: http-request
description: |-
  Retrieve a single continent by its `identifier` string.

  Replace `{{continent_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/continents/:continent_id"
method: GET
pathVariables:
  - key: continent_id
    value: "{{continent_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
