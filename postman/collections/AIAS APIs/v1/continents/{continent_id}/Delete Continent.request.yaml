$kind: http-request
description: Soft-delete a continent record. The record is not permanently removed. Restore it with the corresponding `POST /continents/{{continent_id}}/restore` request.
url: "{{baseUrl}}/v1/continents/:continent_id"
method: DELETE
pathVariables:
  - key: continent_id
    value: "{{continent_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 3000
