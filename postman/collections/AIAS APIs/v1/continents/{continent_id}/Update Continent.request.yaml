$kind: http-request
description: |-
  Update an existing continent record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{continent_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/continents/:continent_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: continent_id
    value: "{{continent_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "name": "Africa",
      "slug": "africa",
      "short_code": "AF",
      "iso_code": "AF",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "slug": {
          "type": "string"
        },
        "short_code": {
          "type": "string"
        },
        "iso_code": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
