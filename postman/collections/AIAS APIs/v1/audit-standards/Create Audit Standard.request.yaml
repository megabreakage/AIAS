$kind: http-request
description: |-
  Create a new audit standard record.

  On success the `identifier` of the new record is automatically saved to `{{audit_standard_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/audit-standards"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "ISA 315",
      "code": "ISA-315",
      "description": "Identifying and Assessing Risks of Material Misstatement",
      "issuing_body": "IAASB",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "code": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "issuing_body": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
