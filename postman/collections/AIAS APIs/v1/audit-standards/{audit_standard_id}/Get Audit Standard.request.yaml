$kind: http-request
description: |-
  Retrieve a single audit standard by its `identifier` string.

  Replace `{{audit_standard_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/audit-standards/:audit_standard_id"
method: GET
pathVariables:
  - key: audit_standard_id
    value: "{{audit_standard_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
