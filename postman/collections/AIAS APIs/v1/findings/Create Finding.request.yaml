$kind: http-request
description: |-
  Create a new finding record.

  On success the `identifier` of the new record is automatically saved to `{{finding_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/findings"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "workpaper_id": "{{workpaper_id}}",
      "title": "Revenue recognition policy not consistently applied",
      "description": "Management has not consistently applied IFRS 15 revenue recognition criteria",
      "severity": "high",
      "risk_category_id": "{{risk_category_id}}",
      "recommendation": "Implement documented revenue recognition policy and staff training"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "workpaper_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "severity": {
          "type": "string"
        },
        "risk_category_id": {
          "type": "string"
        },
        "recommendation": {
          "type": "string"
        }
      }
    }
order: 2000
