$kind: http-request
description: |-
  Update an existing finding record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{finding_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/findings/:finding_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: finding_id
    value: "{{finding_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "workpaper_id": "{{workpaper_id}}",
      "title": "Revenue recognition policy not consistently applied",
      "description": "Management has not consistently applied IFRS 15 revenue recognition criteria",
      "severity": "high",
      "risk_category_id": "{{risk_category_id}}",
      "recommendation": "Implement documented revenue recognition policy and staff training"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "workpaper_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "severity": {
          "type": "string"
        },
        "risk_category_id": {
          "type": "string"
        },
        "recommendation": {
          "type": "string"
        }
      }
    }
order: 2000
