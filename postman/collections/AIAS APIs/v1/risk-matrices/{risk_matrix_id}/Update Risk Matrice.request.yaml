$kind: http-request
description: |-
  Update an existing risk matrice record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{risk_matrix_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/risk-matrices/:risk_matrix_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: risk_matrix_id
    value: "{{risk_matrix_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "name": "FY2025 Risk Matrix",
      "likelihood_scale": 5,
      "impact_scale": 5
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "likelihood_scale": {
          "type": "integer"
        },
        "impact_scale": {
          "type": "integer"
        }
      }
    }
order: 2000
