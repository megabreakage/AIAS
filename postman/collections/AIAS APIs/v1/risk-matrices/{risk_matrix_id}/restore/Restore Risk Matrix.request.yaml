$kind: http-request
description: Restore Risk Matrix
url: "{{baseUrl}}/v1/risk-matrices/:risk_matrix_id/restore"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  - key: risk_matrix_id
    value: "{{risk_matrix_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        }
      }
    }
order: 1000
