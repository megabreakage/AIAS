$kind: http-request
description: |-
  Retrieve a single risk matrice by its `identifier` string.

  Replace `{{risk_matrix_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/risk-matrices/:risk_matrix_id?tenant_id={{tenant_id}}"
method: GET
queryParams:
  - key: tenant_id
    value: "{{tenant_id}}"
    description: Tenant identifier string (required)
    $type: string
pathVariables:
  - key: risk_matrix_id
    value: "{{risk_matrix_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
