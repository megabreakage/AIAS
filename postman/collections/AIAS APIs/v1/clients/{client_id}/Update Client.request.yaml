$kind: http-request
description: |-
  Update an existing client record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{client_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/clients/:client_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: client_id
    value: "{{client_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Apex Manufacturing Ltd",
      "registration_number": "PVT-20220001",
      "industry": "Manufacturing",
      "country_id": "{{country_id}}",
      "contact_person": "James Mwangi",
      "contact_email": "james.mwangi@apexmfg.test",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "registration_number": {
          "type": "string"
        },
        "industry": {
          "type": "string"
        },
        "country_id": {
          "type": "string"
        },
        "contact_person": {
          "type": "string"
        },
        "contact_email": {
          "type": "string",
          "format": "email"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
