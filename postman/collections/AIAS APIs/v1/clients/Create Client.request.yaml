$kind: http-request
description: |-
  Create a new client record.

  On success the `identifier` of the new record is automatically saved to `{{client_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/clients"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Apex Manufacturing Ltd",
      "registration_number": "PVT-20220001",
      "industry": "Manufacturing",
      "country_id": "{{country_id}}",
      "contact_person": "James Mwangi",
      "contact_email": "james.mwangi@apexmfg.test",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "registration_number": {
          "type": "string"
        },
        "industry": {
          "type": "string"
        },
        "country_id": {
          "type": "string"
        },
        "contact_person": {
          "type": "string"
        },
        "contact_email": {
          "type": "string",
          "format": "email"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
