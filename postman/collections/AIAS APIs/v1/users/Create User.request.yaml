$kind: http-request
description: |-
  Create a new user record.

  On success the `identifier` of the new record is automatically saved to `{{user_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "Dr",
      "first_name": "Jane",
      "middle_name": "",
      "last_name": "Auditor",
      "username": "jane.auditor",
      "email": "jane.auditor@pinnacleaudit.test",
      "country_code": "+254",
      "phone": "0712345678",
      "password": "Password123!",
      "preferred_timezone": "Africa/Nairobi",
      "office_location": "Nairobi, Kenya",
      "is_active": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "title": {
          "type": "string"
        },
        "first_name": {
          "type": "string"
        },
        "middle_name": {
          "type": "string"
        },
        "last_name": {
          "type": "string"
        },
        "username": {
          "type": "string"
        },
        "email": {
          "type": "string",
          "format": "email"
        },
        "country_code": {
          "type": "string"
        },
        "phone": {
          "type": "string"
        },
        "password": {
          "type": "string"
        },
        "preferred_timezone": {
          "type": "string"
        },
        "office_location": {
          "type": "string"
        },
        "is_active": {
          "type": "boolean"
        }
      }
    }
order: 2000
