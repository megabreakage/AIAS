$kind: http-request
description: |-
  Retrieve a single user by its `identifier` string.

  Replace `{{user_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/users/:user_id"
method: GET
pathVariables:
  - key: user_id
    value: "{{user_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
