$kind: http-request
description: |-
  Update an existing control objective record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{control_objective_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/control-objectives/:control_objective_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: control_objective_id
    value: "{{control_objective_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "title": "Revenue Authorisation Control",
      "description": "All revenue transactions must be authorised by a designated authority",
      "control_type": "preventive",
      "risk_category_id": "{{risk_category_id}}",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "control_type": {
          "type": "string"
        },
        "risk_category_id": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
