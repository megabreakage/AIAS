$kind: http-request
description: |-
  Create a new control objective record.

  On success the `identifier` of the new record is automatically saved to `{{control_objective_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/control-objectives"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "title": "Revenue Authorisation Control",
      "description": "All revenue transactions must be authorised by a designated authority",
      "control_type": "preventive",
      "risk_category_id": "{{risk_category_id}}",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "control_type": {
          "type": "string"
        },
        "risk_category_id": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
