$kind: http-request
description: |-
  Create a new preamble record.

  On success the `identifier` of the new record is automatically saved to `{{preamble_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/preambles"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Quality Management Framework Preamble",
      "description": "Establishes the scope and objectives of the quality management framework.",
      "status": "draft",
      "effective_date": "2026-01-01",
      "is_featured": false
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "status": {
          "type": "string"
        },
        "effective_date": {
          "type": "string",
          "format": "date"
        },
        "is_featured": {
          "type": "boolean"
        }
      }
    }
order: 2000
