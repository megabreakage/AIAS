$kind: http-request
description: |-
  Update an existing compliance requirement record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{compliance_requirement_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/compliance-requirements/:compliance_requirement_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: compliance_requirement_id
    value: "{{compliance_requirement_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "regulation_framework_id": "{{regulation_framework_id}}",
      "title": "Section 302 CEO/CFO Certification",
      "description": "Chief executives must certify accuracy of financial reports",
      "compliance_type": "mandatory",
      "due_date": "2026-03-31"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "regulation_framework_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "compliance_type": {
          "type": "string"
        },
        "due_date": {
          "type": "string",
          "format": "date"
        }
      }
    }
order: 2000
