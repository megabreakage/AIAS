$kind: http-request
description: |-
  Update an existing tenant record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{tenant_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/tenants/:tenant_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: tenant_id
    value: "{{tenant_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "name": "Pinnacle Audit Partners",
      "owner_id": "{{user_id}}",
      "domain": "pinnacleaudit.aias.app",
      "country_id": 1,
      "data_center": "us-east-1",
      "status": "active"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "owner_id": {
          "type": "string"
        },
        "domain": {
          "type": "string"
        },
        "country_id": {
          "type": "integer"
        },
        "data_center": {
          "type": "string"
        },
        "status": {
          "type": "string"
        }
      }
    }
order: 2000
