$kind: http-request
description: |-
  Update an existing control test record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{control_test_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/control-tests/:control_test_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: control_test_id
    value: "{{control_test_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "control_objective_id": "{{control_objective_id}}",
      "title": "Test revenue authorisation approvals",
      "description": "Select a sample of 30 revenue transactions and verify authorisation signatures",
      "test_type": "reperformance",
      "sample_size": 30,
      "assigned_to": "{{user_id}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "control_objective_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "test_type": {
          "type": "string"
        },
        "sample_size": {
          "type": "integer"
        },
        "assigned_to": {
          "type": "string"
        }
      }
    }
order: 2000
