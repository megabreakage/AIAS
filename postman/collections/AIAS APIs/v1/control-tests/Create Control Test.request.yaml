$kind: http-request
description: |-
  Create a new control test record.

  On success the `identifier` of the new record is automatically saved to `{{control_test_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/control-tests"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "control_objective_id": "{{control_objective_id}}",
      "title": "Test revenue authorisation approvals",
      "description": "Select a sample of 30 revenue transactions and verify authorisation signatures",
      "test_type": "reperformance",
      "sample_size": 30,
      "assigned_to": "{{user_id}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "control_objective_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "test_type": {
          "type": "string"
        },
        "sample_size": {
          "type": "integer"
        },
        "assigned_to": {
          "type": "string"
        }
      }
    }
order: 2000
