$kind: http-request
description: |-
  Update an existing audit plan record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{audit_plan_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/audit-plans/:audit_plan_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: audit_plan_id
    value: "{{audit_plan_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "title": "Risk Assessment Phase Plan",
      "objectives": "Assess material misstatement risks across all financial statement areas",
      "methodology": "Risk-based audit approach per ISA 315",
      "planned_start_date": "2026-01-15",
      "planned_end_date": "2026-01-31"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "objectives": {
          "type": "string"
        },
        "methodology": {
          "type": "string"
        },
        "planned_start_date": {
          "type": "string",
          "format": "date"
        },
        "planned_end_date": {
          "type": "string",
          "format": "date"
        }
      }
    }
order: 2000
