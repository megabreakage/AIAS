$kind: http-request
description: |-
  Create a new audit plan record.

  On success the `identifier` of the new record is automatically saved to `{{audit_plan_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/audit-plans"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "title": "Risk Assessment Phase Plan",
      "objectives": "Assess material misstatement risks across all financial statement areas",
      "methodology": "Risk-based audit approach per ISA 315",
      "planned_start_date": "2026-01-15",
      "planned_end_date": "2026-01-31"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "objectives": {
          "type": "string"
        },
        "methodology": {
          "type": "string"
        },
        "planned_start_date": {
          "type": "string",
          "format": "date"
        },
        "planned_end_date": {
          "type": "string",
          "format": "date"
        }
      }
    }
order: 2000
