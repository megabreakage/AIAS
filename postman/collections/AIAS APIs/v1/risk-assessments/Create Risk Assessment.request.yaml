$kind: http-request
description: |-
  Create a new risk assessment record.

  On success the `identifier` of the new record is automatically saved to `{{risk_assessment_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/risk-assessments"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "risk_category_id": "{{risk_category_id}}",
      "title": "Revenue Completeness Risk",
      "description": "Risk that revenue is not completely recorded",
      "inherent_risk_level": "high",
      "control_risk_level": "medium",
      "detection_risk_level": "low",
      "assessed_risk_level": "high"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "risk_category_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "inherent_risk_level": {
          "type": "string"
        },
        "control_risk_level": {
          "type": "string"
        },
        "detection_risk_level": {
          "type": "string"
        },
        "assessed_risk_level": {
          "type": "string"
        }
      }
    }
order: 2000
