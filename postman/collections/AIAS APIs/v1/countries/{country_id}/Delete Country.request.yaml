$kind: http-request
description: Soft-delete a country record. The record is not permanently removed. Restore it with the corresponding `POST /countries/{{country_id}}/restore` request.
url: "{{baseUrl}}/v1/countries/:country_id"
method: DELETE
pathVariables:
  - key: country_id
    value: "{{country_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 3000
