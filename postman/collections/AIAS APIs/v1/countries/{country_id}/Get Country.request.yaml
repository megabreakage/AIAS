$kind: http-request
description: |-
  Retrieve a single country by its `identifier` string.

  Replace `{{country_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/countries/:country_id"
method: GET
pathVariables:
  - key: country_id
    value: "{{country_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
