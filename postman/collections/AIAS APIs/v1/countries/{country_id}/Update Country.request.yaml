$kind: http-request
description: |-
  Update an existing country record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{country_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/countries/:country_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: country_id
    value: "{{country_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "name": "Kenya",
      "slug": "kenya",
      "continent_id": 1,
      "short_code": "KE",
      "iso_code": "KE",
      "currency": "KES",
      "currency_name": "Kenyan Shilling",
      "currency_sign": "KSh",
      "country_code": "+254",
      "phone_digits": 9,
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "slug": {
          "type": "string"
        },
        "continent_id": {
          "type": "integer"
        },
        "short_code": {
          "type": "string"
        },
        "iso_code": {
          "type": "string"
        },
        "currency": {
          "type": "string"
        },
        "currency_name": {
          "type": "string"
        },
        "currency_sign": {
          "type": "string"
        },
        "country_code": {
          "type": "string"
        },
        "phone_digits": {
          "type": "integer"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
