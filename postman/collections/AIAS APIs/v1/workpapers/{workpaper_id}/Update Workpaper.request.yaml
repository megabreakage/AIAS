$kind: http-request
description: |-
  Update an existing workpaper record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{workpaper_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/workpapers/:workpaper_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: workpaper_id
    value: "{{workpaper_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "audit_procedure_id": "{{audit_procedure_id}}",
      "title": "Revenue Substantive Testing — Q4 2025",
      "reference": "WP-REV-001",
      "description": "Revenue sampling and vouching procedures",
      "status": "draft"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "audit_procedure_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "reference": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "status": {
          "type": "string"
        }
      }
    }
order: 2000
