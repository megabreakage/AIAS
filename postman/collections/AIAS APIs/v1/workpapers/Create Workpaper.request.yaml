$kind: http-request
description: |-
  Create a new workpaper record.

  On success the `identifier` of the new record is automatically saved to `{{workpaper_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/workpapers"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "audit_procedure_id": "{{audit_procedure_id}}",
      "title": "Revenue Substantive Testing — Q4 2025",
      "reference": "WP-REV-001",
      "description": "Revenue sampling and vouching procedures",
      "status": "draft"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "audit_engagement_id": {
          "type": "string"
        },
        "audit_procedure_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "reference": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "status": {
          "type": "string"
        }
      }
    }
order: 2000
