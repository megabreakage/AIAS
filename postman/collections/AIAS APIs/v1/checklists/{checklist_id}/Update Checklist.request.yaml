$kind: http-request
description: |-
  Update an existing checklist record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{checklist_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/checklists/:checklist_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: checklist_id
    value: "{{checklist_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Q1 Financial Audit Checklist",
      "quality_controller_id": null,
      "preamble_id": null,
      "checklist_type_id": null,
      "is_active": true,
      "is_featured": false
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "is_active": {
          "type": "boolean"
        },
        "is_featured": {
          "type": "boolean"
        }
      }
    }
order: 2000
