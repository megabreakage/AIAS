$kind: http-request
description: |-
  Create a new checklist record.

  On success the `identifier` of the new record is automatically saved to `{{checklist_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/checklists"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Q1 Financial Audit Checklist",
      "quality_controller_id": null,
      "preamble_id": null,
      "checklist_type_id": null,
      "is_active": true,
      "is_featured": false
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "is_active": {
          "type": "boolean"
        },
        "is_featured": {
          "type": "boolean"
        }
      }
    }
order: 2000
