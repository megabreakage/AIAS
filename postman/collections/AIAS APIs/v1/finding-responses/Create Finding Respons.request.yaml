$kind: http-request
description: |-
  Create a new finding respons record.

  On success the `identifier` of the new record is automatically saved to `{{finding_response_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/finding-responses"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "finding_id": "{{finding_id}}",
      "response": "Management accepts the finding. A formal revenue recognition policy will be developed and staff trained by Q2 2026.",
      "action_plan": "Engage external consultant to develop policy",
      "target_date": "2026-06-30",
      "responsible_person": "CFO"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "finding_id": {
          "type": "string"
        },
        "response": {
          "type": "string"
        },
        "action_plan": {
          "type": "string"
        },
        "target_date": {
          "type": "string",
          "format": "date"
        },
        "responsible_person": {
          "type": "string"
        }
      }
    }
order: 2000
