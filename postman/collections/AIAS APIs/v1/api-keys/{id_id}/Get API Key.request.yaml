$kind: http-request
description: |-
  Retrieve a single api key by its `identifier` string.

  Replace `{{id_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/api-keys/:id_id"
method: GET
pathVariables:
  - key: id_id
    value: "{{id_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
