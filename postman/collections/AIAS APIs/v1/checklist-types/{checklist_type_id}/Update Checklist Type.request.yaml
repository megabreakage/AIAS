$kind: http-request
description: |-
  Update an existing checklist type record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{checklist_type_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/checklist-types/:checklist_type_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: checklist_type_id
    value: "{{checklist_type_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Pre-Engagement Checklist",
      "description": "Checklist items to complete before commencing an audit engagement.",
      "is_active": true,
      "is_featured": false
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "is_active": {
          "type": "boolean"
        },
        "is_featured": {
          "type": "boolean"
        }
      }
    }
order: 2000
