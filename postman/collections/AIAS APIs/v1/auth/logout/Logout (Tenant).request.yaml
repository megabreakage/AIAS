$kind: http-request
description: |-
  Revoke the current Bearer access token for a tenant user.

  After logout the `access_token` is invalidated. Pass `tenant_id` to ensure the correct tenant context is used for token revocation.
url: "{{baseUrl}}/v1/auth/logout"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        }
      }
    }
order: 1000
