$kind: http-request
description: |-
  Register a new user account within a tenant context (public endpoint — no auth required).

  This endpoint is the self-service registration route for tenant users. It only accepts the minimal user identity fields — role assignment is done separately via the tenant user management endpoints.

  Required fields: `first_name`, `last_name`, `email` (unique within tenant), `password` (min 8 chars, must include both letters and numbers), `password_confirmation` (must match `password`).

  Note: `tenant_id`, `username`, `phone`, `title`, and other profile fields are **not accepted** by this endpoint. Use the Create Tenant User endpoint for full profile creation.
url: "{{baseUrl}}/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "first_name": "Jane",
      "last_name": "Auditor",
      "email": "jane.auditor@example.test",
      "password": "Password123!",
      "password_confirmation": "Password123!"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "first_name": {
          "type": "string"
        },
        "last_name": {
          "type": "string"
        },
        "email": {
          "type": "string",
          "format": "email"
        },
        "password": {
          "type": "string"
        },
        "password_confirmation": {
          "type": "string"
        }
      }
    }
order: 1000
