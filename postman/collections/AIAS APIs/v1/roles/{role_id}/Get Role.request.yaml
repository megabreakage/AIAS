$kind: http-request
description: |-
  Retrieve a single role by its `identifier` string.

  Replace `{{role_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/roles/:role_id"
method: GET
pathVariables:
  - key: role_id
    value: "{{role_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
