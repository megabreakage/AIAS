$kind: http-request
description: |-
  Update an existing risk category record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{risk_category_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/risk-categories/:risk_category_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: risk_category_id
    value: "{{risk_category_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "name": "Financial Risk",
      "code": "FIN",
      "description": "Risks related to financial reporting and transactions",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "code": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
