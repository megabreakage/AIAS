$kind: http-request
description: |-
  Create a new risk category record.

  On success the `identifier` of the new record is automatically saved to `{{risk_category_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/risk-categories"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Financial Risk",
      "code": "FIN",
      "description": "Risks related to financial reporting and transactions",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "code": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
