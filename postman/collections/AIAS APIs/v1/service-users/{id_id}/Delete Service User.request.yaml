$kind: http-request
description: Soft-delete a service user record. The record is not permanently removed. Restore it with the corresponding `POST /service-users/{{id_id}}/restore` request.
url: "{{baseUrl}}/v1/service-users/:id_id"
method: DELETE
pathVariables:
  - key: id_id
    value: "{{id_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 3000
