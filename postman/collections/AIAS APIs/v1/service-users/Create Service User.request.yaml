$kind: http-request
description: |-
  Create a new service user record.

  On success the `identifier` of the new record is automatically saved to `{{id_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/service-users"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Integration Bot",
      "email": "bot@pinnacleaudit.test",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string"
        },
        "email": {
          "type": "string",
          "format": "email"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
