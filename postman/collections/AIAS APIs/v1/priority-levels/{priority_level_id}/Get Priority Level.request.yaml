$kind: http-request
description: |-
  Retrieve a single priority level by its `identifier` string.

  Replace `{{priority_level_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/priority-levels/:priority_level_id?tenant_id={{tenant_id}}"
method: GET
queryParams:
  - key: tenant_id
    value: "{{tenant_id}}"
    description: Tenant identifier string (required)
    $type: string
pathVariables:
  - key: priority_level_id
    value: "{{priority_level_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
