$kind: http-request
description: |-
  Create a new audit template record.

  On success the `identifier` of the new record is automatically saved to `{{audit_template_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/audit-templates"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Financial Statement Audit Template",
      "audit_standard_id": "{{audit_standard_id}}",
      "description": "Standard template for financial statement audits",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "audit_standard_id": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
