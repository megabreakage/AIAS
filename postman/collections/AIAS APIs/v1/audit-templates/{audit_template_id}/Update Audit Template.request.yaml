$kind: http-request
description: |-
  Update an existing audit template record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{audit_template_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/audit-templates/:audit_template_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: audit_template_id
    value: "{{audit_template_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Financial Statement Audit Template",
      "audit_standard_id": "{{audit_standard_id}}",
      "description": "Standard template for financial statement audits",
      "status": true
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "audit_standard_id": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "status": {
          "type": "boolean"
        }
      }
    }
order: 2000
