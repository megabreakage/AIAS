$kind: http-request
description: |-
  Create a new audit record.

  On success the `identifier` of the new record is automatically saved to `{{audit_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/audits"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Annual Financial Compliance Audit 2026",
      "audit_start_date": "2026-07-01",
      "audit_end_date": "2026-07-31",
      "scope": "internal",
      "checklist_id": null,
      "task_type_id": null,
      "department_id": null,
      "lead_auditor_id": null,
      "quality_manager_id": null,
      "add_appendix": false,
      "description": "Annual internal audit covering financial compliance and controls.",
      "is_featured": false
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "audit_start_date": {
          "type": "string",
          "format": "date"
        },
        "audit_end_date": {
          "type": "string",
          "format": "date"
        },
        "scope": {
          "type": "string"
        },
        "add_appendix": {
          "type": "boolean"
        },
        "description": {
          "type": "string"
        },
        "is_featured": {
          "type": "boolean"
        }
      }
    }
order: 2000
