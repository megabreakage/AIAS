$kind: http-request
description: |-
  Update an existing audit record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{audit_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/audits/:audit_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: audit_id
    value: "{{audit_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Annual Financial Compliance Audit 2026",
      "audit_start_date": "2026-07-01",
      "audit_end_date": "2026-07-31",
      "scope": "internal",
      "checklist_id": null,
      "task_type_id": null,
      "department_id": null,
      "lead_auditor_id": null,
      "quality_manager_id": null,
      "add_appendix": false,
      "description": "Annual internal audit covering financial compliance and controls.",
      "is_featured": false
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "audit_start_date": {
          "type": "string",
          "format": "date"
        },
        "audit_end_date": {
          "type": "string",
          "format": "date"
        },
        "scope": {
          "type": "string"
        },
        "add_appendix": {
          "type": "boolean"
        },
        "description": {
          "type": "string"
        },
        "is_featured": {
          "type": "boolean"
        }
      }
    }
order: 2000
