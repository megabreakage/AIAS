$kind: http-request
description: |-
  Retrieve a single audit engagement by its `identifier` string.

  Replace `{{audit_engagement_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/audit-engagements/:audit_engagement_id?tenant_id={{tenant_id}}"
method: GET
queryParams:
  - key: tenant_id
    value: "{{tenant_id}}"
    description: Tenant identifier string (required)
    $type: string
pathVariables:
  - key: audit_engagement_id
    value: "{{audit_engagement_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
