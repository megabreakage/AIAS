$kind: http-request
description: |-
  Update an existing audit engagement record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{audit_engagement_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/audit-engagements/:audit_engagement_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: audit_engagement_id
    value: "{{audit_engagement_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "title": "FY2025 Financial Statement Audit — Apex Manufacturing",
      "client_id": "{{client_id}}",
      "audit_standard_id": "{{audit_standard_id}}",
      "regulation_framework_id": "{{regulation_framework_id}}",
      "audit_type": "financial",
      "start_date": "2026-01-15",
      "end_date": "2026-03-31",
      "lead_auditor_id": "{{user_id}}",
      "status": "planning"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "title": {
          "type": "string"
        },
        "client_id": {
          "type": "string"
        },
        "audit_standard_id": {
          "type": "string"
        },
        "regulation_framework_id": {
          "type": "string"
        },
        "audit_type": {
          "type": "string"
        },
        "start_date": {
          "type": "string",
          "format": "date"
        },
        "end_date": {
          "type": "string",
          "format": "date"
        },
        "lead_auditor_id": {
          "type": "string"
        },
        "status": {
          "type": "string"
        }
      }
    }
order: 2000
