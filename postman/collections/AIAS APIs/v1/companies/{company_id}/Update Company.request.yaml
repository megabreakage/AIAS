$kind: http-request
description: |-
  Update an existing company record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{company_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/companies/:company_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: company_id
    value: "{{company_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Apex Holdings Ltd",
      "address": "123 Business Park, Westlands",
      "office_location": "Nairobi, Kenya",
      "latitude": -1.2921,
      "longitude": 36.8219,
      "postal_code": "00100",
      "country_id": null,
      "level_of_operations": "local",
      "trading_name": "Apex",
      "website": "https://apexholdings.test",
      "email": "info@apexholdings.test",
      "phone": "+254712345678",
      "description": "Leading investment and holding company.",
      "is_active": true,
      "is_featured": false,
      "company_contacts": [
        {
          "user_id": null,
          "contact_type": "primary"
        }
      ]
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "address": {
          "type": "string"
        },
        "office_location": {
          "type": "string"
        },
        "latitude": {
          "type": "number"
        },
        "longitude": {
          "type": "number"
        },
        "postal_code": {
          "type": "string"
        },
        "level_of_operations": {
          "type": "string"
        },
        "trading_name": {
          "type": "string"
        },
        "website": {
          "type": "string",
          "format": "uri"
        },
        "email": {
          "type": "string",
          "format": "email"
        },
        "phone": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "is_active": {
          "type": "boolean"
        },
        "is_featured": {
          "type": "boolean"
        },
        "company_contacts": {
          "type": "array",
          "items": {
            "type": "object",
            "properties": {
              "contact_type": {
                "type": "string"
              }
            }
          }
        }
      }
    }
order: 2000
