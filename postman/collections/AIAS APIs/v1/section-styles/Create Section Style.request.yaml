$kind: http-request
description: |-
  Create a new section style record.

  On success the `identifier` of the new record is automatically saved to `{{section_style_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/section-styles"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Two Column Layout",
      "description": "A two-column layout for side-by-side checklist items.",
      "columns": 2,
      "is_active": true,
      "is_featured": false
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "columns": {
          "type": "integer"
        },
        "is_active": {
          "type": "boolean"
        },
        "is_featured": {
          "type": "boolean"
        }
      }
    }
order: 2000
