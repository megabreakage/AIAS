$kind: http-request
description: |-
  Retrieve a single section style by its `identifier` string.

  Replace `{{section_style_id}}` with the identifier saved after creation.
url: "{{baseUrl}}/v1/section-styles/:section_style_id?tenant_id={{tenant_id}}"
method: GET
queryParams:
  - key: tenant_id
    value: "{{tenant_id}}"
    description: Tenant identifier string (required)
    $type: string
pathVariables:
  - key: section_style_id
    value: "{{section_style_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
order: 1000
