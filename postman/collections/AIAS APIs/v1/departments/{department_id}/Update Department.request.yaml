$kind: http-request
description: |-
  Update an existing department record.

  Send only the fields you want to change — all fields are optional on update. Replace `{{department_id}}` with the identifier of the record to update.
url: "{{baseUrl}}/v1/departments/:department_id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: department_id
    value: "{{department_id}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Finance & Accounts",
      "address": "2nd Floor, HQ Tower",
      "office_location": "Nairobi, Kenya",
      "latitude": -1.2921,
      "longitude": 36.8219,
      "postal_code": "00100",
      "country_id": null,
      "department_head": null,
      "description": "Manages all financial operations and reporting.",
      "is_active": true,
      "is_featured": false,
      "department_members": [
        {
          "user_id": null
        }
      ]
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "address": {
          "type": "string"
        },
        "office_location": {
          "type": "string"
        },
        "latitude": {
          "type": "number"
        },
        "longitude": {
          "type": "number"
        },
        "postal_code": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "is_active": {
          "type": "boolean"
        },
        "is_featured": {
          "type": "boolean"
        },
        "department_members": {
          "type": "array",
          "items": {
            "type": "object",
            "properties": {}
          }
        }
      }
    }
order: 2000
