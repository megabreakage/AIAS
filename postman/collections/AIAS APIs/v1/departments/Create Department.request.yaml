$kind: http-request
description: |-
  Create a new department record.

  On success the `identifier` of the new record is automatically saved to `{{department_id}}` in the active environment via the post-response test script.
url: "{{baseUrl}}/v1/departments"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Finance & Accounts",
      "address": "2nd Floor, HQ Tower",
      "office_location": "Nairobi, Kenya",
      "latitude": -1.2921,
      "longitude": 36.8219,
      "postal_code": "00100",
      "country_id": null,
      "department_head": null,
      "description": "Manages all financial operations and reporting.",
      "is_active": true,
      "is_featured": false,
      "department_members": [
        {
          "user_id": null
        }
      ]
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "tenant_id": {
          "type": "string"
        },
        "name": {
          "type": "string"
        },
        "address": {
          "type": "string"
        },
        "office_location": {
          "type": "string"
        },
        "latitude": {
          "type": "number"
        },
        "longitude": {
          "type": "number"
        },
        "postal_code": {
          "type": "string"
        },
        "description": {
          "type": "string"
        },
        "is_active": {
          "type": "boolean"
        },
        "is_featured": {
          "type": "boolean"
        },
        "department_members": {
          "type": "array",
          "items": {
            "type": "object",
            "properties": {}
          }
        }
      }
    }
order: 2000
