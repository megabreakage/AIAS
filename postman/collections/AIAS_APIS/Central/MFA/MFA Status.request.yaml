$kind: http-request
name: MFA Status
description: |-
  Returns the current MFA status for the authenticated user.

  Response includes `mfa_enabled`, `mfa_method`, `mfa_confirmed_at`, and `backup_codes_remaining`.
url: "{{base_url}}/v1/mfa/status"
method: GET
headers:
  Accept: application/json
  Authorization: "Bearer {{access_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('MFA status returned', () => {
          pm.response.to.have.status(200);
          const j = pm.response.json();
          pm.expect(j.data).to.have.property('mfa_enabled');
          pm.expect(j.data).to.have.property('mfa_method');
      });
    language: text/javascript
order: 1000
