$kind: http-request
description: Update an existing audit standard.
url: "{{base_url}}/audit-standards/{{audit_standard_id}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "ISA 315",
      "code": "ISA-315",
      "description": "Identifying and Assessing Risks of Material Misstatement",
      "issuing_body": "IAASB",
      "status": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Response is JSON', () => { pm.response.to.be.json; });
      pm.test('Status is success', () => {
          const j = pm.response.json();
          pm.expect(j).to.have.property('status', 'success');
      });
    language: text/javascript
order: 4000
