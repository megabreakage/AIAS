$kind: http-request
name: Create API Key
description: 'Create a new api key record.


  On success the `identifier` of the new record is automatically saved to `{{id_id}}`
  in the active environment via the post-response test script.'
url: '{{base_url}}/v1/api-keys'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "service_user_id": "{{service_user_id}}",
      "name": "Production Key",
      "expires_at": "2027-12-31"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('id_id', String(resourceId));
            console.log('Saved id_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
