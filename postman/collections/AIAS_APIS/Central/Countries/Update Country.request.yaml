$kind: http-request
name: Update Country
description: 'Update an existing country record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{country_id}}` with the identifier of the record to update.'
url: '{{base_url}}/v1/countries/{{country_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Kenya",
      "slug": "kenya",
      "continent_id": 1,
      "short_code": "KE",
      "iso_code": "KE",
      "currency": "KES",
      "currency_name": "Kenyan Shilling",
      "currency_sign": "KSh",
      "country_code": "+254",
      "phone_digits": 9,
      "status": true
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
