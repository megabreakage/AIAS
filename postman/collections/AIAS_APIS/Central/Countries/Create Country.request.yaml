$kind: http-request
name: Create Country
description: 'Create a new country record.


  On success the `identifier` of the new record is automatically saved to `{{country_id}}`
  in the active environment via the post-response test script.'
url: '{{base_url}}/v1/countries'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Kenya",
      "slug": "kenya",
      "continent_id": 1,
      "short_code": "KE",
      "iso_code": "KE",
      "currency": "KES",
      "currency_name": "Kenyan Shilling",
      "currency_sign": "KSh",
      "country_code": "+254",
      "phone_digits": 9,
      "status": true
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('country_id', String(resourceId));
            console.log('Saved country_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
