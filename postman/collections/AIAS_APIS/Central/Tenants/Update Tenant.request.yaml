$kind: http-request
name: Update Tenant
description: 'Update an existing tenant record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{tenant_id}}` with the identifier of the record to update.'
url: '{{base_url}}/v1/tenants/{{tenant_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Pinnacle Audit Partners",
      "owner_id": "{{user_id}}",
      "domain": "pinnacleaudit.aias.app",
      "country_id": 1,
      "data_center": "us-east-1",
      "status": "active"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
