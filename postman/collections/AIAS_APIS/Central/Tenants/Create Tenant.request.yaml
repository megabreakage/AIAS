$kind: http-request
name: Create Tenant
description: 'Create a new tenant record.


  On success the `identifier` of the new record is automatically saved to `{{tenant_id}}`
  in the active environment via the post-response test script.'
url: '{{base_url}}/v1/tenants'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Pinnacle Audit Partners",
      "owner_id": "{{user_id}}",
      "domain": "pinnacleaudit.aias.app",
      "country_id": 1,
      "data_center": "us-east-1",
      "status": "active"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('tenant_id', String(resourceId));
            console.log('Saved tenant_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
