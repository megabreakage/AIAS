$kind: http-request
name: Register (Tenant User)
description: 'Register a new user account within a tenant context (public endpoint
  — no auth required).


  This endpoint is the self-service registration route for tenant users. It only accepts
  the minimal user identity fields — role assignment is done separately via the tenant
  user management endpoints.


  Required fields: `first_name`, `last_name`, `email` (unique within tenant), `password`
  (min 8 chars, must include both letters and numbers), `password_confirmation` (must
  match `password`).


  Note: `tenant_id`, `username`, `phone`, `title`, and other profile fields are **not
  accepted** by this endpoint. Use the Create Tenant User endpoint for full profile
  creation.'
url: '{{base_url}}/v1/auth/register'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "first_name": "Jane",
      "last_name": "Auditor",
      "email": "jane.auditor@example.test",
      "password": "Password123!",
      "password_confirmation": "Password123!"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
