$kind: http-request
name: Create Role
description: Create a new role.
url: '{{base_url}}/roles'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "auditor",
      "permissions": [
        "view audit-engagements",
        "create workpapers"
      ]
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('role_id', String(resourceId));
            console.log('Saved role_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
