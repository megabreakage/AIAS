$kind: http-request
name: Update Role
description: 'Update an existing role record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{role_id}}` with the identifier of the record to update.'
url: '{{base_url}}/v1/roles/{{role_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "auditor",
      "permissions": [
        "view audit-engagements",
        "create workpapers"
      ]
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
