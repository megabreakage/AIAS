$kind: http-request
name: Delete Regulation Framework
description: Soft-delete a regulation framework.
url: '{{base_url}}/regulation-frameworks/{{regulation_framework_id}}'
method: DELETE
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 5000
