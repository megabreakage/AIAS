$kind: http-request
name: Update Service User
description: 'Update an existing service user record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{id_id}}` with the identifier of the record to update.'
url: '{{base_url}}/v1/service-users/{{id_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Integration Bot",
      "email": "bot@pinnacleaudit.test",
      "status": true
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
