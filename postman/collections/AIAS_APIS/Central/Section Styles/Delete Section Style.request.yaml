$kind: http-request
description: Soft-delete a section style by identifier.
url: "{{base_url}}/section-styles/{{section_style_id}}"
method: DELETE
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 204', () => { pm.response.to.have.status(204); });
    language: text/javascript
order: 5000
