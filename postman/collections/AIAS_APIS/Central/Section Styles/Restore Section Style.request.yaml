$kind: http-request
description: Restore a soft-deleted section style by identifier.
url: "{{base_url}}/section-styles/{{section_style_id}}/restore"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Response is JSON', () => { pm.response.to.be.json; });
      pm.test('Status is 200', () => { pm.response.to.have.status(200); });
      pm.test('Data has identifier', () => {
          const j = pm.response.json();
          pm.expect(j.data).to.have.property('identifier');
          pm.expect(j.data.deleted_at).to.be.null;
      });
    language: text/javascript
order: 6000
