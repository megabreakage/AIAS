$kind: http-request
description: Retrieve a single section style by identifier.
url: "{{base_url}}/section-styles/{{section_style_id}}"
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Response is JSON', () => { pm.response.to.be.json; });
      pm.test('Status is 200', () => { pm.response.to.have.status(200); });
      pm.test('Data has expected fields', () => {
          const j = pm.response.json();
          pm.expect(j.data).to.have.property('identifier');
          pm.expect(j.data).to.have.property('name');
          pm.expect(j.data).to.have.property('columns');
          pm.expect(j.data).to.have.property('is_active');
          pm.expect(j.data).to.have.property('is_featured');
      });
    language: text/javascript
order: 3000
