$kind: http-request
name: Update Risk Category
description: 'Update an existing risk category record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{risk_category_id}}` with the identifier of the record to update.'
url: '{{base_url}}/v1/risk-categories/{{risk_category_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Financial Risk",
      "code": "FIN",
      "description": "Risks related to financial reporting and transactions",
      "status": true
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
