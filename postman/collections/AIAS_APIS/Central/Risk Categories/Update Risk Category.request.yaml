$kind: http-request
description: Update an existing risk category.
url: "{{base_url}}/risk-categories/{{risk_category_id}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Financial Risk",
      "code": "FIN",
      "description": "Risks related to financial reporting and transactions",
      "status": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Response is JSON', () => { pm.response.to.be.json; });
      pm.test('Status is success', () => {
          const j = pm.response.json();
          pm.expect(j).to.have.property('status', 'success');
      });
    language: text/javascript
order: 4000
