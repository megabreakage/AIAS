$kind: collection
description: 'Create central platform users (super-admins and tenant owners).


  Only `POST /v1/users` is currently implemented — full CRUD management is handled
  through tenant-scoped user management.


  Required: `first_name`, `last_name`, `username` (unique), `email` (unique), `password`.

  Optional: `title`, `middle_name`, `country_code`, `phone`, `preferred_timezone`,
  `office_location`, `avatar`, `notes`, `is_active`.


  Note: `password_confirmation` is not required. `role` and `status` fields do not
  exist in the request — use tenant user management for role assignment.'
order: 5000
