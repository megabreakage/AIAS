$kind: http-request
name: Get Continent
description: 'Retrieve a single continent by its `identifier` string.


  Replace `{{continent_id}}` with the identifier saved after creation.'
url: '{{base_url}}/v1/continents/{{continent_id}}'
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 3000
