  **ŌÜĀ’ĖÅ Planned / Not Yet Implemented:** Roles, Service Users, API Keys, MFA, Audit Standards, Regulation Frameworks, Risk Categories, Clients, Audit Templates, Audit Engagements, Audit Plans, Audit Procedures, Workpapers, Findings, Finding Responses, Risk Assessments, Risk Matrices, Compliance Requirements, Compliance Evidence, Control Objectives, Control Tests, Reports, Firm Settings.

  ---

  ## Authentication

  All protected endpoints require a `Bearer` token in the `Authorization` header.

  **Central login:** `POST {{base_url}}/v1/auth/login` ŌĆö email + password only. Returns a token for super-admin operations (tenants, users, reference data).

  **Tenant login:** `POST {{base_url}}/v1/auth/login` ŌĆö requires `tenant_id` in the JSON body alongside email and password. Returns a token scoped to that tenant's database.

  After login, `access_token`, `user_id`, and `tenant_id` are auto-saved to the environment by the test script.

  ---

  ## Route Prefixes

  | Scope | Base Variable | Example URL |
  |-------|--------------|------------|
  | Central | `{{base_url}}` | `{{base_url}}/v1/tenants` |
  | Tenant | `{{base_url}}` | `{{base_url}}/v1/audits` |

  - `base_url` is `http://localhost:8020/api` ŌĆö used for all routes (central and tenant).

  ---

  ## Tenant Identification

  Tenancy is initialised via the `tenant_id` body/query parameter (`InitializeTenancyByBodyParam` middleware).

  Pass `tenant_id` (identifier string, e.g. `AT.1.1748000000`) in every tenant-scoped request:
  - **POST / PUT / PATCH** ŌĆö include `tenant_id` in the JSON body
  - **GET / DELETE** ŌĆö include `tenant_id` as a query parameter

  The `{{tenant_id}}` variable is auto-populated after login and stored in the environment.

  ---

  ## Response Envelope

  All responses follow a consistent `BaseResource` envelope:
  ```json
  {
    "status": "success",
    "message": "Resource retrieved successfully",
    "data": { ... }
  }
  ```
  Paginated list responses include `metadata` with `current_page`, `last_page`, `per_page`, `total`.

  ---

  ## Pagination

  List endpoints accept: `?page=1&per_page=15&search=&sort_by=created_at&sort_order=desc&show_deleted=0`

  ---

  ## Soft Deletes

  All resources support soft-delete. Deleted records are hidden by default. Restore with `POST /{identifier}/restore`. Pass `?show_deleted=1` to include deleted records in lists.

  ---

  ## ID / Identifier Convention

  Route binding uses the string `identifier` field (format: `AT.{n}.{timestamp}`), **not** the numeric database `id`. All env vars store identifier strings (e.g. `{{preamble_id}}` = `"AT.5.1748000000"`).

  **ŌÜĀ’ĖÅ Integer FK Exception:** Some relationship ID fields in request bodies accept numeric integer DB IDs (not identifier strings). These are explicitly documented in each endpoint's description:
  - `continent_id` in Country requests ŌĆö numeric integer
  - `department_id`, `lead_auditor_id`, `quality_manager_id`, `checklist_id`, `task_type_id` in Audit requests ŌĆö numeric integer
  - `quality_controller_id`, `preamble_id`, `checklist_type_id` in Checklist requests ŌĆö numeric integer
  - `department_head`, `department_members.*.user_id` in Department requests ŌĆö numeric integer
  - `company_contacts.*.user_id` in Company requests ŌĆö numeric integer

  ---

  ## Environment Variables

  Key variables auto-populated by test scripts after each Create request:
  - `access_token` ŌĆö Bearer token (set after login)
  - `user_id` ŌĆö Authenticated user identifier (set after login/me)
  - `tenant_id` ŌĆö Current tenant identifier (set after login)
  - `<resource>_id` ŌĆö Resource identifier saved after each successful Create (e.g. `preamble_id`, `audit_id`)

  ---

