$kind: collection
id: aias-a1b2c3d4-e5f6-7890-abcd-ef1234567890
name: AIAS API
description: "# AIAS — Adaptive Intelligent Audit System\n\nA multi-tenant Laravel\
  \ 13 REST API for audit engagements, compliance tracking, risk assessments, and\
  \ audit workflows.\n\n## Authentication\n\nAll protected endpoints require a `Bearer`\
  \ token in the `Authorization` header.\n\n**Central (super-admin):** `POST {{base_url}}/v1/auth/login`\
  \ — returns a token for managing tenants, users, reference data, and global audit\
  \ standards.\n\n**Tenant user:** `POST {{tenant_base_url}}/v1/auth/login` — include\
  \ `tenant_id` in the JSON body. Returns a token scoped to that tenant's database.\n\
  \n## Route Prefixes\n\n| Scope | Base Variable | Prefix | Example |\n|-------|--------------|--------|--------|\n\
  | Central | `{{base_url}}` | `/api/v1/` | `{{base_url}}/v1/tenants` |\n| Tenant\
  \ | `{{tenant_base_url}}` | `/v1/` | `{{tenant_base_url}}/v1/audits` |\n\n## Tenant\
  \ Identification\n\nPass `tenant_id` (identifier string, e.g. `AT.1.1748000000`)\
  \ in every tenant-scoped request:\n- **POST / PUT / PATCH** — include `tenant_id`\
  \ in the JSON body\n- **GET / DELETE** — include `tenant_id` as a query parameter\n\
  \nThe `{{tenant_id}}` variable is auto-populated after login and stored in the environment.\n\
  \n## Response Envelope\n\nAll responses follow a consistent envelope:\n```json\n\
  {\n  \"status\": \"success\",\n  \"message\": \"Resource retrieved successfully\"\
  ,\n  \"data\": { ... },\n  \"metadata\": { \"total\": 42, \"page\": 1 }\n}\n```\n\
  \n## Pagination\n\nList endpoints support: `?page=1&per_page=15&search=&sort_by=created_at&sort_order=desc`\n\
  \n## Soft Deletes\n\nAll resources support soft-delete. Use `POST /{id}/restore`\
  \ to restore a soft-deleted record. Pass `?show_deleted=1` on list endpoints to\
  \ include soft-deleted records.\n\n## ID / Identifier Convention\n\nResources use\
  \ a string `identifier` (format: `AT.{n}.{timestamp}`) for route binding and references.\
  \ Numeric database `id` values are not exposed. **Exception:** `continent_id` in\
  \ country records is a numeric integer FK — not an identifier string.\n\n## Environment\
  \ Variables\n\nKey variables auto-populated by test scripts:\n- `access_token` —\
  \ Bearer token (after login)\n- `user_id` — Authenticated user identifier\n- `tenant_id`\
  \ — Current tenant identifier\n- `<resource>_id` — Identifier of the last created\
  \ resource (e.g. `audit_engagement_id`)\n\n## Tech Stack\n\nLaravel 13 · PHP 8.4\
  \ · Passport OAuth2 · Stancl Tenancy v3 · Spatie Permission · MySQL"
variables:
  base_url: http://localhost:8020/api
  tenant_base_url: http://localhost:8020
auth:
- id: cba390d9-dacd-4cef-8639-728436a27ea3
  type: bearer
  name: bearer auth
  credentials:
    token: '{{access_token}}'
