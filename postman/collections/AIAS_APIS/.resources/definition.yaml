  # AIAS ŌĆö Adaptive Intelligent Audit System

  A multi-tenant Laravel 13 REST API for quality management, audit workflows, compliance tracking, risk assessments, and findings management.

  **Version:** 1.0 | **Framework:** Laravel 13, PHP 8.4 | **Auth:** Laravel Passport (Personal Access Tokens) | **Tenancy:** Stancl Tenancy v3

  ---

  ## Ō£ģ Currently Implemented Endpoints

  **Central API** (`{{base_url}}/v1/...`)
  - Auth: login, logout, me
  - Tenants: CRUD + create tenant user
  - Users: create (POST only)
  - Continents: full CRUD + restore
  - Countries: full CRUD + restore

  **Tenant API** (`{{base_url}}/v1/...` ŌĆö requires `tenant_id`)
  - Auth: register, login, logout, me
  - Priority Levels: full CRUD + restore
  - Preambles: full CRUD + restore
  - Users: full CRUD + restore
  - Checklist Types: full CRUD + restore
  - Section Styles: full CRUD + restore
  - Checklists: full CRUD + restore
  - Companies: full CRUD + restore
  - Departments: full CRUD + restore
