$kind: http-request
name: Update Section Style
description: 'Update an existing section style record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{section_style_id}}` with the identifier of the record to update.'
url: '{{base_url}}/v1/section-styles/{{section_style_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Two Column Layout",
      "description": "A two-column layout for side-by-side checklist items.",
      "columns": 2,
      "is_active": true,
      "is_featured": false
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
