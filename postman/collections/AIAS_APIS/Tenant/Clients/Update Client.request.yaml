$kind: http-request
name: Update Client
description: 'Update an existing client record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{client_id}}` with the identifier of the record to update.'
url: '{{tenant_base_url}}/v1/clients/{{client_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Apex Manufacturing Ltd",
      "registration_number": "PVT-20220001",
      "industry": "Manufacturing",
      "country_id": "{{country_id}}",
      "contact_person": "James Mwangi",
      "contact_email": "james.mwangi@apexmfg.test",
      "status": true
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
