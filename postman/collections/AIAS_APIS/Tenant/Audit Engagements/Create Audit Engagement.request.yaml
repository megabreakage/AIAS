$kind: http-request
name: Create Audit Engagement
description: 'Create a new audit engagement record.


  On success the `identifier` of the new record is automatically saved to `{{audit_engagement_id}}`
  in the active environment via the post-response test script.'
url: '{{tenant_base_url}}/v1/audit-engagements'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "title": "FY2025 Financial Statement Audit \u2014 Apex Manufacturing",
      "client_id": "{{client_id}}",
      "audit_standard_id": "{{audit_standard_id}}",
      "regulation_framework_id": "{{regulation_framework_id}}",
      "audit_type": "financial",
      "start_date": "2026-01-15",
      "end_date": "2026-03-31",
      "lead_auditor_id": "{{user_id}}",
      "status": "planning"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('audit_engagement_id', String(resourceId));
            console.log('Saved audit_engagement_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
