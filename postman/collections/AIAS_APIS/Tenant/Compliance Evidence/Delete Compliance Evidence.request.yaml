$kind: http-request
name: Delete Compliance Evidence
description: Soft-delete a compliance evidence record. The record is not permanently
  removed. Restore it with the corresponding `POST /compliance-evidence/{{compliance_evidence_id}}/restore`
  request.
url: '{{base_url}}/v1/compliance-evidence/{{compliance_evidence_id}}'
method: DELETE
headers:
  Accept: application/json
  Content-Type: application/json
queryParams:
- key: tenant_id
  value: '{{tenant_id}}'
  description: Tenant identifier string (required)
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 5000
