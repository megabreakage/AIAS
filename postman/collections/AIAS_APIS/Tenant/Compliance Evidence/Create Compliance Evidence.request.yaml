$kind: http-request
name: Create Compliance Evidence
description: 'Create a new compliance evidence record.


  On success the `identifier` of the new record is automatically saved to `{{compliance_evidence_id}}`
  in the active environment via the post-response test script.'
url: '{{base_url}}/v1/compliance-evidence'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "compliance_requirement_id": "{{compliance_requirement_id}}",
      "title": "Signed CEO Certification Letter",
      "description": "CEO certification signed and filed with SEC",
      "evidence_date": "2026-03-25",
      "collected_by": "{{user_id}}"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('compliance_evidence_id', String(resourceId));
            console.log('Saved compliance_evidence_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
