$kind: http-request
name: Get Risk Matrice
description: 'Retrieve a single risk matrice by its `identifier` string.


  Replace `{{risk_matrix_id}}` with the identifier saved after creation.'
url: '{{tenant_base_url}}/v1/risk-matrices/{{risk_matrix_id}}'
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
queryParams:
- key: tenant_id
  value: '{{tenant_id}}'
  description: Tenant identifier string (required)
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 3000
