$kind: http-request
name: Get Company
description: 'Retrieve a single company by its `identifier` string.


  Replace `{{company_id}}` with the identifier saved after creation.'
url: '{{base_url}}/v1/companies/{{company_id}}'
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
queryParams:
- key: tenant_id
  value: '{{tenant_id}}'
  description: Tenant identifier string (required)
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 3000
