$kind: http-request
name: Create Control Objective
description: 'Create a new control objective record.


  On success the `identifier` of the new record is automatically saved to `{{control_objective_id}}`
  in the active environment via the post-response test script.'
url: '{{base_url}}/v1/control-objectives'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "title": "Revenue Authorisation Control",
      "description": "All revenue transactions must be authorised by a designated authority",
      "control_type": "preventive",
      "risk_category_id": "{{risk_category_id}}",
      "status": true
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('control_objective_id', String(resourceId));
            console.log('Saved control_objective_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
