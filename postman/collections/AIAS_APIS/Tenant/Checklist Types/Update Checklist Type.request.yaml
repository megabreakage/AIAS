$kind: http-request
name: Update Checklist Type
description: 'Update an existing checklist type record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{checklist_type_id}}` with the identifier of the record to update.'
url: '{{tenant_base_url}}/v1/checklist-types/{{checklist_type_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Pre-Engagement Checklist",
      "description": "Checklist items to complete before commencing an audit engagement.",
      "is_active": true,
      "is_featured": false
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
