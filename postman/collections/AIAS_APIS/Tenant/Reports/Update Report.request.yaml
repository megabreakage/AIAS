$kind: http-request
name: Update Report
description: 'Update an existing report record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{report_id}}` with the identifier of the record to update.'
url: '{{tenant_base_url}}/v1/reports/{{report_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "report_type": "audit_report",
      "title": "Independent Auditor's Report \u2014 FY2025",
      "period_from": "2025-01-01",
      "period_to": "2025-12-31"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
