$kind: http-request
description: Soft-delete a report.
url: "{{tenant_base_url}}/reports/{{report_id}}"
method: DELETE
headers:
  Accept: application/json
  Content-Type: application/json
queryParams:
  - key: tenant_id
    value: "{{tenant_id}}"
    description: Tenant identifier string (required)
scripts:
  - type: afterResponse
    code: |-
      pm.test('Response is JSON', () => { pm.response.to.be.json; });
      pm.test('Status is success', () => {
          const j = pm.response.json();
          pm.expect(j).to.have.property('status', 'success');
      });
    language: text/javascript
order: 5000
