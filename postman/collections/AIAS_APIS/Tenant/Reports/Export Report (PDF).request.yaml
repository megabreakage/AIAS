$kind: http-request
name: Export Report (PDF)
description: Export Report (PDF)
url: '{{tenant_base_url}}/v1/reports/{{report_id}}/export'
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
queryParams:
  description: Tenant identifier string (required)
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 10000
