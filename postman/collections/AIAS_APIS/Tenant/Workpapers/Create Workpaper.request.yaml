$kind: http-request
name: Create Workpaper
description: 'Create a new workpaper record.


  On success the `identifier` of the new record is automatically saved to `{{workpaper_id}}`
  in the active environment via the post-response test script.'
url: '{{base_url}}/v1/workpapers'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "audit_procedure_id": "{{audit_procedure_id}}",
      "title": "Revenue Substantive Testing \u2014 Q4 2025",
      "reference": "WP-REV-001",
      "description": "Revenue sampling and vouching procedures",
      "status": "draft"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('workpaper_id', String(resourceId));
            console.log('Saved workpaper_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
