$kind: collection
description: 'Manage tenant-scoped user accounts within the audit firm.


  Required: `first_name`, `last_name`, `username` (unique within tenant), `email`
  (unique within tenant), `password`.

  Optional: `title`, `middle_name`, `country_code`, `phone`, `preferred_timezone`,
  `office_location`, `avatar`, `notes`, `is_active`.


  Note: `role` assignment is managed separately via the Roles endpoints. `is_active`
  (boolean) replaces the older `status` field.


  Soft-deleted users can be restored via `POST /users/{identifier}/restore`.'
order: 5000
