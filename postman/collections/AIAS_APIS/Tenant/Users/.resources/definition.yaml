$kind: collection
description: 'Manage tenant-scoped user accounts within the audit firm.


  Required: `first_name`, `last_name`, `username` (unique within tenant), `email`
  (unique within tenant), `password` (min 8 chars, must contain letters and numbers).


  Optional: `title`, `middle_name`, `country_code`, `phone`, `preferred_timezone`,
  `office_location`, `avatar`, `notes`, `is_active` (boolean).


  Note: Role assignment is managed separately via `POST /api/v1/tenants/{id}/users`
  (central endpoint). The `is_active` field (boolean) controls account access. The
  `identifier` of the created user is auto-saved to `{{tenant_user_id}}` in the environment.


  Soft-deleted users can be restored via `POST /users/{identifier}/restore`.'
order: 5000
