$kind: collection
description: 'Manage tenant departments with geocoding support, member assignments,
  and department head linkage.


  `department_head` is the `identifier` string of the user appointed as department
  head. `department_members` is an array of `{user_id}` objects listing department
  member identifiers. `country_id` is an integer FK (numeric ID) to the countries
  table. `latitude` and `longitude` are decimal geocoding coordinates (optional).


  Soft-deleted departments can be restored via `POST /departments/{identifier}/restore`.'
order: 7000
