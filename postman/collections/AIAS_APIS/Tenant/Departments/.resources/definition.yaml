$kind: collection
description: 'Manage tenant departments with geocoding support, member assignments,
  and department head linkage.


  **⚠️ Integer FK fields** (pass numeric DB `id`, not the identifier string):

  - `department_head` — numeric DB `id` of the user appointed as department head (nullable).

  - `department_members.*.user_id` — numeric DB `id` of each member user (nullable).

  - `country_id` — numeric DB `id` of the country record (nullable).


  `latitude` and `longitude` are decimal geocoding coordinates (optional). `postal_code`
  is a string up to 20 chars.


  Soft-deleted departments can be restored via `POST /departments/{identifier}/restore`.'
order: 7000
