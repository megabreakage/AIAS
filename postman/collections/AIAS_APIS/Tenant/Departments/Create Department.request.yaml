$kind: http-request
name: Create Department
description: 'Create a new department record.


  On success the `identifier` of the new record is automatically saved to `{{department_id}}`
  in the active environment via the post-response test script.'
url: '{{tenant_base_url}}/v1/departments'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Finance & Accounts",
      "address": "2nd Floor, HQ Tower",
      "office_location": "Nairobi, Kenya",
      "latitude": -1.2921,
      "longitude": 36.8219,
      "postal_code": "00100",
      "country_id": null,
      "department_head": null,
      "description": "Manages all financial operations and reporting.",
      "is_active": true,
      "is_featured": false,
      "department_members": [
        {
          "user_id": null
        }
      ]
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('department_id', String(resourceId));
            console.log('Saved department_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
