$kind: http-request
name: Update Department
description: Update an existing department.
url: '{{tenant_base_url}}/departments/{{department_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Finance & Accounts",
      "address": "2nd Floor, HQ Tower",
      "office_location": "Nairobi, Kenya",
      "postal_code": "00100",
      "country_id": null,
      "department_head": null,
      "description": "Manages all financial operations and reporting.",
      "is_active": true,
      "is_featured": false,
      "department_members": [
        {
          "user_id": null
        }
      ]
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
