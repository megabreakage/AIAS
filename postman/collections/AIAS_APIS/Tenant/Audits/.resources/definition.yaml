$kind: collection
description: 'Manage tenant audit records — the core audit execution entity.


  `scope` values: `internal`, `external`, `service_provider`, `supplier`. `audit_start_date`
  is **required** (format: `YYYY-MM-DD`). `audit_end_date` must be on or after `audit_start_date`.


  **⚠️ Integer FK fields** (pass numeric DB `id`, not the identifier string):

  - `checklist_id` — numeric DB `id` of the checklist to link (nullable).

  - `task_type_id` — numeric DB `id` of the task type (nullable).

  - `department_id` — numeric DB `id` of the department being audited (nullable).

  - `lead_auditor_id` — numeric DB `id` of the lead auditor user (nullable).

  - `quality_manager_id` — numeric DB `id` of the quality manager user (nullable).


  `add_appendix` (boolean) indicates whether to attach an appendix to the audit report.
  `is_featured` pins the audit to the top of lists.


  Status progression is tracked via status stages loaded in the response. Soft-deleted
  audits can be restored via `POST /audits/{identifier}/restore`.'
order: 8000
