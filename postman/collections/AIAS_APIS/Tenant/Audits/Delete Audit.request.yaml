$kind: http-request
name: Delete Audit
description: Soft-delete a audit record. The record is not permanently removed. Restore
  it with the corresponding `POST /audits/{{audit_id}}/restore` request.
url: '{{tenant_base_url}}/v1/audits/{{audit_id}}'
method: DELETE
headers:
  Accept: application/json
  Content-Type: application/json
queryParams:
- key: tenant_id
  value: '{{tenant_id}}'
  description: Tenant identifier string (required)
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 5000
