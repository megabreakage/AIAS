$kind: http-request
name: Update Audit
description: 'Update an existing audit record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{audit_id}}` with the identifier of the record to update.'
url: '{{tenant_base_url}}/v1/audits/{{audit_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Annual Financial Compliance Audit 2026",
      "audit_start_date": "2026-07-01 08:00:00",
      "audit_end_date": "2026-07-31 17:00:00",
      "scope": "internal",
      "checklist_id": null,
      "department_id": "{{department_id}}",
      "lead_auditor_id": null,
      "quality_manager_id": null,
      "add_appendix": false,
      "description": "Annual internal audit covering financial compliance and controls.",
      "is_featured": false
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
