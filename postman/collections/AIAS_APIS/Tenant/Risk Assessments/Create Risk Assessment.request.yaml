$kind: http-request
name: Create Risk Assessment
description: 'Create a new risk assessment record.


  On success the `identifier` of the new record is automatically saved to `{{risk_assessment_id}}`
  in the active environment via the post-response test script.'
url: '{{base_url}}/v1/risk-assessments'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "audit_engagement_id": "{{audit_engagement_id}}",
      "risk_category_id": "{{risk_category_id}}",
      "title": "Revenue Completeness Risk",
      "description": "Risk that revenue is not completely recorded",
      "inherent_risk_level": "high",
      "control_risk_level": "medium",
      "detection_risk_level": "low",
      "assessed_risk_level": "high"
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('risk_assessment_id', String(resourceId));
            console.log('Saved risk_assessment_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
