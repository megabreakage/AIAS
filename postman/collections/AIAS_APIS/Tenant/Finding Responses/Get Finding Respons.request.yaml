$kind: http-request
name: Get Finding Respons
description: 'Retrieve a single finding respons by its `identifier` string.


  Replace `{{finding_response_id}}` with the identifier saved after creation.'
url: '{{tenant_base_url}}/v1/finding-responses/{{finding_response_id}}'
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
queryParams:
  description: Tenant identifier string (required)
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 3000
