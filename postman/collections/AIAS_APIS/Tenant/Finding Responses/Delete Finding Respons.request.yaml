$kind: http-request
name: Delete Finding Respons
description: Soft-delete a finding respons record. The record is not permanently removed.
  Restore it with the corresponding `POST /finding-responses/{{finding_response_id}}/restore`
  request.
url: '{{tenant_base_url}}/v1/finding-responses/{{finding_response_id}}'
method: DELETE
headers:
  Accept: application/json
  Content-Type: application/json
queryParams:
- key: tenant_id
  value: '{{tenant_id}}'
  description: Tenant identifier string (required)
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 5000
