$kind: http-request
name: Create Priority Level
description: 'Create a new priority level record.


  On success the `identifier` of the new record is automatically saved to `{{priority_level_id}}`
  in the active environment via the post-response test script.'
url: '{{base_url}}/v1/priority-levels'
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Critical",
      "description": "Immediate action required \u2014 business-critical impact.",
      "level": 1,
      "color": "#FF0000",
      "is_active": true
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Status code is 201', () => { pm.response.to.have.status(201); });
    pm.test('Response envelope valid', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status');
        pm.expect(j).to.have.property('data');
    });
    if (pm.response.code === 201) {
        const j = pm.response.json();
        // Save the identifier string (e.g. AT.1.1234567890) — NOT the numeric id
        const resourceId = j.data && (j.data.identifier || j.data.id);
        if (resourceId) {
            pm.environment.set('priority_level_id', String(resourceId));
            console.log('Saved priority_level_id:', resourceId);
        }
    }
  language: text/javascript
order: 2000
