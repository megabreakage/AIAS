$kind: http-request
name: Update Checklist
description: Update an existing checklist.
url: '{{tenant_base_url}}/checklists/{{checklist_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Q1 Financial Audit Checklist",
      "quality_controller_id": null,
      "preamble_id": null,
      "checklist_type_id": null,
      "is_active": true,
      "is_featured": false
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
