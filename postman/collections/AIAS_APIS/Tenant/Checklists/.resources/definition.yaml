$kind: collection
description: 'Manage audit checklists with quality controller assignment, preamble
  linkage, and type classification.


  `quality_controller_id` is the `identifier` of the user responsible for quality
  control. `preamble_id` links the checklist to a quality management preamble. `checklist_type_id`
  classifies the checklist (e.g. Pre-Engagement, Field Work). All three ID fields
  accept identifier strings or `null`.


  Soft-deleted checklists can be restored via `POST /checklists/{identifier}/restore`.'
order: 4000
