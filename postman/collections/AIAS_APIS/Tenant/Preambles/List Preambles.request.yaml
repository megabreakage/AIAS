$kind: http-request
name: List Preambles
description: |-
  Retrieve a paginated list of preambles.

  Supports filtering via `search`, sorting via `sort_by`/`sort_order`, and pagination via `page`/`per_page` (max 100 per page). Pass `show_deleted=1` to include soft-deleted records. Pass `tenant_id` as a query parameter to scope results to the tenant.
url: "{{tenant_base_url}}/v1/preambles"
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "tenant_id":"{{tenant_id}}"
    }
auth:
  type: inherit
  credentials:
    id: cba390d9-dacd-4cef-8639-728436a27ea3
scripts:
  - type: afterResponse
    code: |-
      pm.test('Response is JSON', () => { pm.response.to.be.json; });
      pm.test('Status is success', () => {
          const j = pm.response.json();
          pm.expect(j).to.have.property('status', 'success');
      });
    language: text/javascript
order: 1000
