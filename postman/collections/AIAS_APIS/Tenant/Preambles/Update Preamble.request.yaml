$kind: http-request
name: Update Preamble
description: 'Update an existing preamble record.


  Send only the fields you want to change — all fields are optional on update. Replace
  `{{preamble_id}}` with the identifier of the record to update.'
url: '{{tenant_base_url}}/v1/preambles/{{preamble_id}}'
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}",
      "name": "Quality Management Framework Preamble",
      "description": "Establishes the scope and objectives of the quality management framework.",
      "status": "draft",
      "effective_date": "2026-01-01",
      "is_featured": false
    }
scripts:
- type: afterResponse
  code: |-
    pm.test('Response is JSON', () => { pm.response.to.be.json; });
    pm.test('Status is success', () => {
        const j = pm.response.json();
        pm.expect(j).to.have.property('status', 'success');
    });
  language: text/javascript
order: 4000
