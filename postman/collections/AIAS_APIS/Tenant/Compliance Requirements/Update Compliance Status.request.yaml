$kind: http-request
description: Update Compliance Status
url: "{{tenant_base_url}}/compliance-requirements/{{compliance_requirement_id}}\
  /track"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "tenant_id": "{{tenant_id}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Response is JSON', () => { pm.response.to.be.json; });
      pm.test('Status is success', () => {
          const j = pm.response.json();
          pm.expect(j).to.have.property('status', 'success');
      });
    language: text/javascript
order: 7000
