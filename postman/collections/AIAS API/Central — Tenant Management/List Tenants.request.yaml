$kind: http-request
description: |-
  Requires central_token.

  Returns all tenants with their associated domains. Supports filters: search, status, sort_by, sort_order.

  Sets tenant_id to the first result.
url: "{{central_base_url}}/tenants?page=1&per_page=15"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "1"
  - key: per_page
    value: "15"
  - key: search
    value: ""
    disabled: true
  - key: status
    value: ""
    disabled: true
  - key: sort_by
    value: name
    disabled: true
  - key: sort_order
    value: asc
    disabled: true
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Tenant array', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.be.an('array');
          pm.expect(b).to.have.property('meta');
          if (b.data.length > 0) {
              const t = b.data[0];
              pm.expect(t).to.have.property('id');
              pm.expect(t).to.have.property('name');
              pm.expect(t).to.have.property('plan');
              pm.expect(t).to.have.property('status');
              pm.environment.set('tenant_id', t.id);
              console.log('tenant_id set to first result: ' + t.id);
          }
      });
    language: text/javascript
order: 2000
