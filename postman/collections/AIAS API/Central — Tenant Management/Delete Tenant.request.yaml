$kind: http-request
description: |-
  Requires sa_token.

  Soft-deletes the tenant record. Triggers TenantDeleted event which drops the tenant database in the background.

  WARNING: This action drops all tenant data.

  Error responses:
    401 — Unauthenticated
    404 — Tenant not found
url: "{{central_base_url}}/tenants/{{tenant_id}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 204', () => pm.response.to.have.status(204));
      console.log('Tenant deleted. TenantDeleted event fires DB drop in background.');
    language: text/javascript
order: 4000
