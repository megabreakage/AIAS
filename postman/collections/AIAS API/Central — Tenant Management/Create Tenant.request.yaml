$kind: http-request
description: |-
  Requires sa_token.

  Creates a new tenant and provisions a dedicated database. The domain field is optional — if provided, it must be unique.

  Field rules:
    id     — nullable, lowercase alphanumeric/hyphens/underscores, auto-generated from name if omitted
    name   — required, max 255
    plan   — nullable, one of: starter | professional | enterprise (default: starter)
    domain — nullable, must be unique across all tenants

  Triggers TenantCreated event → DB create → migrations → seeder in background.

  Error responses:
    401 — Unauthenticated
    422 — Validation failed (duplicate id/domain, invalid format)
url: "{{central_base_url}}/tenants"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Acme Corporation",
      "id": "acme-corp",
      "plan": "starter",
      "domain": "acme-corp.localhost"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Tenant created', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('id');
          pm.expect(b.data).to.have.property('name');
          pm.expect(b.data).to.have.property('plan');
          pm.expect(b.data).to.have.property('status', 'active');
          pm.expect(b.data).to.have.property('domains');
          pm.collectionVariables.set('tenant_id', b.data.id);
          console.log('tenant_id auto-saved: ' + b.data.id);
          console.log('Tenant DB provisioning triggered in background.');
      });
    language: text/javascript
order: 2000
