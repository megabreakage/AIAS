$kind: http-request
description: "Public endpoint. Returns { status: ok } with full meta block including request_id and version."
url: "{{central_base_url}}/health"
method: GET
headers:
  Accept: application/json
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Success envelope', () => {
          const b = pm.response.json();
          pm.expect(b).to.have.property('data');
          pm.expect(b.data).to.have.property('status', 'ok');
          pm.expect(b).to.have.property('meta');
          pm.expect(b.meta).to.have.property('version', 'v1');
          pm.expect(b.meta).to.have.property('request_id');
      });
    language: text/javascript
order: 1000
