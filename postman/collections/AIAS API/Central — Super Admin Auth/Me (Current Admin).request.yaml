$kind: http-request
description: |-
  Requires sa_token (Bearer — inherited from collection).

  Returns authenticated super-admin profile including is_active flag.

  Error responses:
    401 — Unauthenticated
url: "{{central_base_url}}/auth/me"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Admin profile', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.all.keys('id', 'first_name', 'last_name', 'email', 'is_active');
          pm.expect(b.meta).to.have.property('version', 'v1');
      });
    language: text/javascript
order: 2000
