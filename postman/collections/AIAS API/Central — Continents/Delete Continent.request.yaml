$kind: http-request
description: |-
  Requires sa_token.

  Soft-deletes a continent by its identifier UUID.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden (missing role)
    404 — Continent not found
url: "{{central_base_url}}/continents/{{continent_identifier}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 204', () => pm.response.to.have.status(204));
    language: text/javascript
order: 5000
