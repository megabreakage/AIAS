$kind: http-request
description: |-
  Requires central_token.

  Creates a new continent.

  Field rules:
    name       — required, max 255, unique
    slug       — nullable, max 255 (auto-generated from name if omitted)
    short_code — nullable, max 10
    iso_code   — nullable, max 10
    status     — nullable, boolean (default: true)

  Error responses:
    401 — Unauthenticated
    422 — Validation failed (duplicate name)
url: "{{central_base_url}}/continents"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Africa",
      "short_code": "AF",
      "iso_code": "AF",
      "status": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Continent created', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('name');
          pm.expect(b.data).to.have.property('slug');
          pm.expect(b.data).to.have.property('short_code');
          pm.expect(b.data).to.have.property('iso_code');
          pm.expect(b.data).to.have.property('status');
          pm.environment.set('continent_identifier', b.data.identifier);
          console.log('continent_identifier auto-saved: ' + b.data.identifier);
      });
    language: text/javascript
order: 2000
