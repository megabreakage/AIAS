$kind: http-request
description: |-
  Requires sa_token.

  Updates an existing continent. All fields are optional (partial update).

  Error responses:
    401 — Unauthenticated
    404 — Continent not found
    422 — Validation failed (duplicate name)
url: "{{central_base_url}}/continents/{{continent_identifier}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Africa (Updated)",
      "short_code": "AFR"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Continent updated', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('name');
          pm.expect(b.data).to.have.property('slug');
          pm.expect(b.data).to.have.property('status');
      });
    language: text/javascript
order: 4000
