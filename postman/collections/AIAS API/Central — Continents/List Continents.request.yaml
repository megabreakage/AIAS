$kind: http-request
description: |-
  Requires sa_token.

  Lists all continents with optional filtering, sorting, and pagination.

  Query params:
    search    — optional text search on name/slug/short_code/iso_code
    status    — optional boolean (true/false)
    per_page  — optional page size (default 15, max 100)
    page      — optional page number
    sort_by   — optional: name | short_code | iso_code | status | created_at
    sort_order — optional: asc | desc
url: "{{central_base_url}}/continents"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Continents list response', () => {
          const b = pm.response.json();
          pm.expect(b).to.have.property('data');
          pm.expect(b).to.have.property('meta');
          pm.expect(b.data).to.be.an('array');
          if (b.data.length > 0 && b.data[0].identifier) {
              pm.collectionVariables.set('continent_identifier', b.data[0].identifier);
              console.log('continent_identifier set from first list item: ' + b.data[0].identifier);
          }
      });
    language: text/javascript
order: 1000
