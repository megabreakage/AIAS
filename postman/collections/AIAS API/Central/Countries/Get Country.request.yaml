$kind: http-request
description: |-
  Requires central_token.

  Fetches a single country by identifier including its continent relation.

  Error responses:
    401 — Unauthenticated
    404 — Country not found
url: "{{central_base_url}}/countries/{{country_identifier}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Country object', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('name');
          pm.expect(b.data).to.have.property('slug');
          pm.expect(b.data).to.have.property('continent');
          pm.expect(b.data).to.have.property('short_code');
          pm.expect(b.data).to.have.property('iso_code');
          pm.expect(b.data).to.have.property('currency');
          pm.expect(b.data).to.have.property('currency_name');
          pm.expect(b.data).to.have.property('currency_sign');
          pm.expect(b.data).to.have.property('country_code');
          pm.expect(b.data).to.have.property('phone_digits');
          pm.expect(b.data).to.have.property('status');
          pm.expect(b.data).to.have.property('created_at');
          pm.expect(b.data).to.have.property('updated_at');
      });
    language: text/javascript
order: 3000
