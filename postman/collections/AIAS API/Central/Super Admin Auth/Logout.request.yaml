$kind: http-request
description: |-
  Requires central_token (Bearer — inherited from collection).

  Revokes the Passport access token and clears central_token collection variable.

  Error responses:
    401 — Unauthenticated
url: "{{central_base_url}}/auth/logout"
method: POST
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Logged out', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('message', 'Logged out successfully.');
      });
      pm.environment.set('central_token', '');
      console.log('central_token cleared.');
    language: text/javascript
order: 3000
