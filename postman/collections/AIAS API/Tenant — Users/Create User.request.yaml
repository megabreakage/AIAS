$kind: http-request
description: |-
  Requires tenant_token.

  Creates a new user in the resolved tenant.

  Field rules:
    title              — nullable, string, max 50
    first_name         — required, string, max 100
    middle_name        — nullable, string, max 100
    last_name          — required, string, max 100
    username           — required, unique within tenant, max 100
    email              — required, unique within tenant, max 255
    country_code       — nullable, string, max 10
    phone              — nullable, string, max 30
    password           — required, min 8, must include letters and numbers
    preferred_timezone — nullable, string, max 100
    office_location    — nullable, string, max 255
    avatar             — nullable, string (URL), max 500
    notes              — nullable, string
    is_active          — nullable, boolean (defaults to true)

  Error responses:
    401 — Unauthenticated
    403 — Forbidden (missing user.create permission)
    422 — Validation failed
url: "{{tenant_base_url}}/users"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "Mrs.",
      "first_name": "Elma",
      "middle_name": null,
      "last_name": "Wambui",
      "username": "elma",
      "email": "elma@airtraffic.com",
      "country_code": "+254",
      "phone": "0727905402",
      "password": "T@ngo540",
      "preferred_timezone": "Africa/Nairobi",
      "office_location": "Lengai House, Wilson Airport",
      "avatar": null,
      "notes": null,
      "is_active": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('User created', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('first_name');
          pm.expect(b.data).to.have.property('last_name');
          pm.expect(b.data).to.have.property('email');
          pm.expect(b.data).to.have.property('username');
          pm.expect(b.data).to.have.property('is_active');
          pm.environment.set('user_identifier', b.data.identifier);
          console.log('user_identifier auto-saved: ' + b.data.identifier);
      });
    language: text/javascript
order: 2000
