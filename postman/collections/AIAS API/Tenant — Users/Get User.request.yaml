$kind: http-request
description: |-
  Requires tenant_token.

  Fetches a single user by identifier.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden (missing user.view permission)
    404 — User not found
url: "{{tenant_base_url}}/users/{{user_identifier}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('User object', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('first_name');
          pm.expect(b.data).to.have.property('last_name');
          pm.expect(b.data).to.have.property('full_name');
          pm.expect(b.data).to.have.property('email');
          pm.expect(b.data).to.have.property('username');
          pm.expect(b.data).to.have.property('is_active');
          pm.expect(b.data).to.have.property('created_at');
          pm.expect(b.data).to.have.property('updated_at');
      });
    language: text/javascript
order: 3000
