$kind: http-request
description: |-
  Requires tenant_token.

  Returns paginated list of users in the resolved tenant. Supports filters: search, is_active, sort_by, sort_order.

  Sets user_identifier to the first result.
url: "{{tenant_base_url}}/users?page=1&per_page=15"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "1"
  - key: per_page
    value: "15"
  - key: search
    value: ""
    disabled: true
  - key: is_active
    value: "true"
    disabled: true
  - key: sort_by
    value: created_at
    disabled: true
  - key: sort_order
    value: desc
    disabled: true
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Users array', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.be.an('array');
          pm.expect(b).to.have.property('meta');
          if (b.data.length > 0) {
              const u = b.data[0];
              pm.expect(u).to.have.property('identifier');
              pm.expect(u).to.have.property('first_name');
              pm.expect(u).to.have.property('last_name');
              pm.expect(u).to.have.property('email');
              pm.expect(u).to.have.property('is_active');
              pm.environment.set('user_identifier', u.identifier);
              console.log('user_identifier set to first result: ' + u.identifier);
          }
      });
    language: text/javascript
order: 1000
