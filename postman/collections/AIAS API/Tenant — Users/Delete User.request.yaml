$kind: http-request
description: |-
  Requires tenant_token.

  Soft-deletes the user. Cannot delete yourself.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden (missing user.delete permission or attempting self-delete)
    404 — User not found
url: "{{tenant_base_url}}/users/{{user_identifier}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 204', () => pm.response.to.have.status(204));
      console.log('User soft-deleted.');
    language: text/javascript
order: 5000
