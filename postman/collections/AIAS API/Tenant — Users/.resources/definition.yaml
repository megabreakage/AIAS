$kind: collection
description: |-
  Tenant-scoped user management endpoints.

  Requires tenant_token (Bearer auth) and valid tenant resolution via {{tenant_base_url}}.

  Create User auto-saves user_identifier for subsequent requests.
auth:
  - id: c2e63756-ee5e-46d1-894b-feb590d428fc
    type: bearer
    name: bearer auth
    credentials:
      token: "{{tenant_token}}"
order: 9000
