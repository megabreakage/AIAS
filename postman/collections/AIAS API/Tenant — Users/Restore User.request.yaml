$kind: http-request
description: |-
  Requires tenant_token.

  Restores a soft-deleted user.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden (missing user.restore permission)
    404 — User not found in trash
url: "{{tenant_base_url}}/users/{{user_identifier}}/restore"
method: POST
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('User restored', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('is_active');
          pm.expect(b.data.deleted_at).to.be.null;
      });
    language: text/javascript
order: 6000
