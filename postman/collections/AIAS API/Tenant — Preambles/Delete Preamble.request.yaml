$kind: http-request
description: |-
  Requires tenant_token.

  Soft-deletes the preamble.

  Error responses:
    401 — Unauthenticated
    403 — Token belongs to a different tenant
    404 — Preamble not found
url: "{{tenant_base_url}}/preambles/{{preamble_identifier}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 204', () => pm.response.to.have.status(204));
      console.log('Preamble soft-deleted.');
    language: text/javascript
order: 5000
