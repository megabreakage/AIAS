$kind: http-request
description: |-
  Requires tenant_token.

  Soft-deletes a preamble by identifier.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden (missing permission)
    404 — Preamble not found
url: "{{tenant_base_url}}/preambles/{{preamble_identifier}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 204', () => pm.response.to.have.status(204));
      console.log('Preamble soft-deleted: ' + pm.collectionVariables.get('preamble_identifier'));
    language: text/javascript
order: 5000
