$kind: collection
description: |-
  Tenant-domain user authentication. Requests go to http://{{tenant_id}}.localhost:8020/v1.

  This folder uses {{tenant_token}} Bearer auth (not central_token).
  Register and Login auto-save tenant_token to collection variables.
auth:
  - id: 18c5a9e4-8199-48b2-92ca-ca2a1e632da7
    type: bearer
    name: bearer auth
    credentials:
      token: "{{tenant_token}}"
order: 7000
