$kind: http-request
description: |-
  Public endpoint on the tenant domain.

  Creates a new user scoped to the resolved tenant. Returns Bearer token.

  Field rules:
    first_name — required, max 100
    last_name  — required, max 100
    email      — required, valid email, unique within the tenant
    password   — required, min 8 chars
    password_confirmation — required, must match password

  Error responses:
    422 — Validation failed (duplicate email, password mismatch, etc.)
url: "{{tenant_base_url}}/auth/register"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "first_name": "Jane",
      "last_name": "Doe",
      "email": "jane.doe@example.com",
      "password": "password123",
      "password_confirmation": "password123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Returns tenant token', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('token');
          pm.expect(b.data).to.have.property('token_type', 'Bearer');
          pm.expect(b.data).to.have.property('user');
          pm.expect(b.data.user).to.have.property('id');
          pm.expect(b.data.user).to.have.property('email');
          pm.expect(b.data.user).to.have.property('first_name');
          pm.expect(b.data.user).to.have.property('last_name');
          pm.environment.set('tenant_token', b.data.token);
          console.log('tenant_token saved for: ' + b.data.user.email);
      });
    language: text/javascript
order: 1000
