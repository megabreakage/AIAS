$kind: http-request
description: |-
  Requires tenant_token (Bearer — inherited from folder).

  Also validates that the token belongs to this tenant (EnsureTokenMatchesTenant middleware).

  The meta.tenant field confirms the resolved tenant context.

  Error responses:
    401 — Unauthenticated
    403 — Token belongs to a different tenant (TENANT_MISMATCH)
url: "{{tenant_base_url}}/auth/me"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('User profile with tenant context', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('id');
          pm.expect(b.data).to.have.property('email');
          pm.expect(b.data).to.have.property('first_name');
          pm.expect(b.data).to.have.property('last_name');
          pm.expect(b.meta).to.have.property('tenant');
          pm.expect(b.meta.tenant).to.not.be.null;
          console.log('Tenant in meta: ' + b.meta.tenant);
      });
    language: text/javascript
order: 3000
