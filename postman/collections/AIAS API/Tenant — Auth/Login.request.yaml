$kind: http-request
description: |-
  Public endpoint on the tenant domain. Throttled: 10 requests/minute.

  Authenticates a tenant user scoped to the resolved tenant. Returns Bearer token.

  Error responses:
    401 — Invalid credentials
    403 — Account disabled
    422 — Validation failed
url: "{{tenant_base_url}}/auth/login"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "jane.doe@example.com",
      "password": "password123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Returns tenant token', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('token');
          pm.expect(b.data).to.have.property('token_type', 'Bearer');
          pm.expect(b.data).to.have.property('user');
          pm.expect(b.data.user).to.have.property('id');
          pm.expect(b.data.user).to.have.property('email');
          pm.collectionVariables.set('tenant_token', b.data.token);
          console.log('tenant_token saved for: ' + b.data.user.email);
      });
    language: text/javascript
order: 2000
