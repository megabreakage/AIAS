$kind: http-request
description: |-
  Requires sa_token.

  Creates a new country linked to a continent.

  Field rules:
    name          — required, max 255, unique
    continent_id  — required, must exist in continents table
    slug          — nullable, max 255 (auto-generated from name if omitted)
    short_code    — nullable, max 10
    iso_code      — nullable, max 10
    currency      — nullable, max 5 (e.g. KES, USD)
    currency_name — nullable, max 50
    currency_sign — nullable, max 5 (e.g. KSh, $)
    country_code  — nullable, max 10 (e.g. +254)
    phone_digits  — nullable, integer, 1–15
    status        — nullable, boolean (default: true)

  Error responses:
    401 — Unauthenticated
    422 — Validation failed (duplicate name, invalid continent_id)
url: "{{central_base_url}}/countries"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Kenya",
      "continent_id": 1,
      "short_code": "KE",
      "iso_code": "KEN",
      "currency": "KES",
      "currency_name": "Kenyan Shilling",
      "currency_sign": "KSh",
      "country_code": "+254",
      "phone_digits": 10,
      "status": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Country created', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('name');
          pm.expect(b.data).to.have.property('slug');
          pm.expect(b.data).to.have.property('continent');
          pm.expect(b.data).to.have.property('short_code');
          pm.expect(b.data).to.have.property('iso_code');
          pm.expect(b.data).to.have.property('currency');
          pm.expect(b.data).to.have.property('status');
          pm.environment.set('country_identifier', b.data.identifier);
          console.log('country_identifier auto-saved: ' + b.data.identifier);
      });
    language: text/javascript
order: 2000
