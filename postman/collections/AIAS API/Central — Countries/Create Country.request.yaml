$kind: http-request
description: |-
  Requires sa_token.

  Creates a new country and auto-saves country_identifier.

  Required fields:
    name         — unique country name
    continent_id — valid continent ID

  Optional fields:
    slug, short_code, iso_code, currency, currency_name, currency_sign,
    country_code, phone_digits, status

  Error responses:
    401 — Unauthenticated
    403 — Forbidden (missing role)
    422 — Validation failed (name required/unique, continent_id required/exists)
url: "{{central_base_url}}/countries"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Kenya",
      "continent_id": 1,
      "short_code": "KE",
      "iso_code": "KEN",
      "currency": "KES",
      "currency_name": "Kenyan Shilling",
      "currency_sign": "KSh",
      "country_code": "+254",
      "phone_digits": 9,
      "status": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Country created', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('name');
          pm.expect(b.data).to.have.property('slug');
          pm.expect(b.data).to.have.property('short_code');
          pm.expect(b.data).to.have.property('currency');
          pm.expect(b.data).to.have.property('country_code');
          pm.expect(b.data).to.have.property('phone_digits');
          pm.expect(b.data).to.have.property('status');
          pm.collectionVariables.set('country_identifier', b.data.identifier);
          console.log('country_identifier auto-saved: ' + b.data.identifier);
      });
    language: text/javascript
order: 2000
