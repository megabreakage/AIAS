$kind: http-request
description: |-
  Requires sa_token.

  Soft-deletes a country by identifier.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden
    404 — Country not found
url: "{{central_base_url}}/countries/{{country_identifier}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 204', () => pm.response.to.have.status(204));
    language: text/javascript
order: 5000
