$kind: http-request
description: |-
  Requires sa_token.

  Soft-deletes the country.

  Error responses:
    401 — Unauthenticated
    404 — Country not found
url: "{{central_base_url}}/countries/{{country_identifier}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 204', () => pm.response.to.have.status(204));
      console.log('Country soft-deleted.');
    language: text/javascript
order: 5000
