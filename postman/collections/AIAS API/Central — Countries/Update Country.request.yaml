$kind: http-request
description: |-
  Requires sa_token.

  Updates an existing country by identifier.

  All fields optional (partial update). Name must remain unique.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden
    404 — Country not found
    422 — Validation failed
url: "{{central_base_url}}/countries/{{country_identifier}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Kenya Updated",
      "currency_name": "Kenyan Shilling",
      "status": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Country updated', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('name');
      });
    language: text/javascript
order: 4000
