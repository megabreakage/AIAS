$kind: http-request
description: |-
  Requires sa_token.

  Restores a soft-deleted country by identifier.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden
    404 — Country not found
url: "{{central_base_url}}/countries/{{country_identifier}}/restore"
method: POST
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Country restored', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data.deleted_at).to.be.null;
      });
    language: text/javascript
order: 6000
