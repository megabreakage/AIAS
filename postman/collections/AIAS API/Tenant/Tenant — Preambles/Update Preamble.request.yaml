$kind: http-request
description: |-
  Requires tenant_token.

  Updates an existing preamble. All fields are optional (partial update).

  Error responses:
    401 — Unauthenticated
    403 — Token belongs to a different tenant
    404 — Preamble not found
    422 — Validation failed
url: "{{tenant_base_url}}/preambles/{{preamble_identifier}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Quality Policy Statement (Revised)",
      "status": "active",
      "is_featured": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Preamble updated', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('name');
          pm.expect(b.data).to.have.property('status');
      });
    language: text/javascript
order: 4000
