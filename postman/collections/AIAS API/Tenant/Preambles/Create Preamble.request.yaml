$kind: http-request
description: |-
  Requires tenant_token.

  Creates a new preamble scoped to the resolved tenant.

  Field rules:
    name           — required, max 255
    description    — nullable, text
    status         — nullable, one of the allowed statuses (e.g. draft, active, archived)
    effective_date — nullable, valid date (YYYY-MM-DD)
    is_featured    — nullable, boolean

  Error responses:
    401 — Unauthenticated
    403 — Token belongs to a different tenant
    422 — Validation failed
url: "{{tenant_base_url}}/preambles"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Quality Policy Statement",
      "description": "This preamble establishes the quality management policy for the organization.",
      "status": "draft",
      "effective_date": "2026-06-01",
      "is_featured": false
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Preamble created', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('reference_number');
          pm.expect(b.data).to.have.property('name');
          pm.expect(b.data).to.have.property('description');
          pm.expect(b.data).to.have.property('status');
          pm.expect(b.data).to.have.property('effective_date');
          pm.expect(b.data).to.have.property('is_featured');
          pm.environment.set('preamble_identifier', b.data.identifier);
          console.log('preamble_identifier auto-saved: ' + b.data.identifier);
      });
    language: text/javascript
order: 2000
