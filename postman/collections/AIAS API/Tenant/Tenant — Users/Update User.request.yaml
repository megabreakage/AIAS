$kind: http-request
description: |-
  Requires tenant_token.

  Updates an existing user. All fields are optional (partial update).
  Send password only when changing it.

  Error responses:
    401 — Unauthenticated
    403 — Forbidden (missing user.edit permission)
    404 — User not found
    422 — Validation failed
url: "{{tenant_base_url}}/users/{{user_identifier}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "first_name": "Jonathan",
      "office_location": "Mombasa Office",
      "is_active": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('User updated', () => {
          const b = pm.response.json();
          pm.expect(b.data).to.have.property('identifier');
          pm.expect(b.data).to.have.property('first_name');
          pm.expect(b.data).to.have.property('updated_at');
      });
    language: text/javascript
order: 4000
