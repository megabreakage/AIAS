openapi: 3.0.0
info:
  title: AIAS API
  version: 1.0.0
  description: |-
    # AIAS — Adaptive Intelligent Audit System

    A multi-tenant Laravel 13 REST API for quality management, audit workflows, compliance tracking, risk assessments, and findings management.

    **Version:** 1.0 | **Framework:** Laravel 13, PHP 8.4 | **Auth:** Laravel Passport (Personal Access Tokens) | **Tenancy:** Stancl Tenancy v3

    ---

    ## ✅ Currently Implemented Endpoints

    **Central API** (`{{base_url}}/v1/...`)
    - Auth: login, logout, me
    - Tenants: CRUD + create tenant user
    - Users: create (POST only)
    - Continents: full CRUD + restore
    - Countries: full CRUD + restore

    **Tenant API** (`{{tenant_base_url}}/v1/...` — requires `tenant_id`)
    - Auth: register, login, logout, me
    - Priority Levels: full CRUD + restore
    - Preambles: full CRUD + restore
    - Users: full CRUD + restore
    - Checklist Types: full CRUD + restore
    - Section Styles: full CRUD + restore
    - Checklists: full CRUD + restore
    - Companies: full CRUD + restore
    - Departments: full CRUD + restore
    - Audits: full CRUD + restore

    **⚠️ Planned / Not Yet Implemented:** Roles, Service Users, API Keys, MFA, Audit Standards, Regulation Frameworks, Risk Categories, Clients, Audit Templates, Audit Engagements, Audit Plans, Audit Procedures, Workpapers, Findings, Finding Responses, Risk Assessments, Risk Matrices, Compliance Requirements, Compliance Evidence, Control Objectives, Control Tests, Reports, Firm Settings.

    ---

    ## Authentication

    All protected endpoints require a `Bearer` token in the `Authorization` header.

    **Central login:** `POST {{base_url}}/v1/auth/login` — email + password only. Returns a token for super-admin operations (tenants, users, reference data).

    **Tenant login:** `POST {{tenant_base_url}}/v1/auth/login` — requires `tenant_id` in the JSON body alongside email and password. Returns a token scoped to that tenant's database.

    After login, `access_token`, `user_id`, and `tenant_id` are auto-saved to the environment by the test script.

    ---

    ## Route Prefixes

    | Scope | Base Variable | Example URL |
    |-------|--------------|------------|
    | Central | `{{base_url}}` | `{{base_url}}/v1/tenants` |
    | Tenant | `{{tenant_base_url}}` | `{{tenant_base_url}}/v1/audits` |

    - `base_url` includes `/api` (e.g. `http://localhost:8020/api`) — used for central routes.
    - `tenant_base_url` is without `/api` (e.g. `http://localhost:8020`) — used for tenant routes.

    ---

    ## Tenant Identification

    Tenancy is initialised via the `tenant_id` body/query parameter (`InitializeTenancyByBodyParam` middleware).

    Pass `tenant_id` (identifier string, e.g. `AT.1.1748000000`) in every tenant-scoped request:
    - **POST / PUT / PATCH** — include `tenant_id` in the JSON body
    - **GET / DELETE** — include `tenant_id` as a query parameter

    The `{{tenant_id}}` variable is auto-populated after login and stored in the environment.

    ---

    ## Response Envelope

    All responses follow a consistent `BaseResource` envelope:
    ```json
    {
      "status": "success",
      "message": "Resource retrieved successfully",
      "data": { ... }
    }
    ```
    Paginated list responses include `metadata` with `current_page`, `last_page`, `per_page`, `total`.

    ---

    ## Pagination

    List endpoints accept: `?page=1&per_page=15&search=&sort_by=created_at&sort_order=desc&show_deleted=0`

    ---

    ## Soft Deletes

    All resources support soft-delete. Deleted records are hidden by default. Restore with `POST /{identifier}/restore`. Pass `?show_deleted=1` to include deleted records in lists.

    ---

    ## ID / Identifier Convention

    Route binding uses the string `identifier` field (format: `AT.{n}.{timestamp}`), **not** the numeric database `id`. All env vars store identifier strings (e.g. `{{preamble_id}}` = `"AT.5.1748000000"`).

    **⚠️ Integer FK Exception:** Some relationship ID fields in request bodies accept numeric integer DB IDs (not identifier strings). These are explicitly documented in each endpoint's description:
    - `continent_id` in Country requests — numeric integer
    - `department_id`, `lead_auditor_id`, `quality_manager_id`, `checklist_id`, `task_type_id` in Audit requests — numeric integer
    - `quality_controller_id`, `preamble_id`, `checklist_type_id` in Checklist requests — numeric integer
    - `department_head`, `department_members.*.user_id` in Department requests — numeric integer
    - `company_contacts.*.user_id` in Company requests — numeric integer

    ---

    ## Environment Variables

    Key variables auto-populated by test scripts after each Create request:
    - `access_token` — Bearer token (set after login)
    - `user_id` — Authenticated user identifier (set after login/me)
    - `tenant_id` — Current tenant identifier (set after login)
    - `<resource>_id` — Resource identifier saved after each successful Create (e.g. `preamble_id`, `audit_id`)

    ---

    ## Tech Stack

    Laravel 13 · PHP 8.4 · MySQL · Passport OAuth2 (Personal Access Tokens) · Stancl Tenancy v3 (body-param identification) · Spatie Permission v7 · Pest v4
servers:
  - url: "http://localhost:8020/api"
  - url: "http://localhost:8020"
paths:
  /v1/health:
    get:
      summary: Health Check
      responses: {}
      tags:
        - Central
        - Auth
      description: |-
        Verify the API server is running and reachable.

        No authentication required. Returns `200 OK` with a status message when the server is healthy. Both central (`{{base_url}}/v1/health`) and tenant (`{{tenant_base_url}}/v1/health`) health endpoints are available.
  /v1/auth/login:
    post:
      summary: Login (Central / Super-Admin)
      responses: {}
      tags:
        - Central
        - Auth
      description: |-
        Authenticate as a central super-admin user.

        Returns a Bearer `access_token` in `data.token`. The test script automatically saves `access_token`, `user_id`, and `tenant_id` to the active environment. Use `{{base_url}}/v1/auth/login` — no `tenant_id` is required for central login.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
            example:
              email: "{{user_email}}"
              password: "{{user_password}}"
  /v1/auth/register:
    post:
      summary: Register (Tenant User)
      responses: {}
      tags:
        - Central
        - Auth
      description: |-
        Register a new user account within a tenant context (public endpoint — no auth required).

        This endpoint is the self-service registration route for tenant users. It only accepts the minimal user identity fields — role assignment is done separately via the tenant user management endpoints.

        Required fields: `first_name`, `last_name`, `email` (unique within tenant), `password` (min 8 chars, must include both letters and numbers), `password_confirmation` (must match `password`).

        Note: `tenant_id`, `username`, `phone`, `title`, and other profile fields are **not accepted** by this endpoint. Use the Create Tenant User endpoint for full profile creation.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                password_confirmation:
                  type: string
            example:
              first_name: Jane
              last_name: Auditor
              email: jane.auditor@example.test
              password: Password123!
              password_confirmation: Password123!
  /v1/auth/me:
    get:
      summary: Get Authenticated User (Tenant)
      parameters:
        - name: tenant_id
          in: query
          description: Tenant identifier string
          schema:
            type: string
          example: "{{tenant_id}}"
      responses: {}
      tags:
        - Central
        - Auth
      description: |-
        Retrieve the currently authenticated tenant user with their roles, permissions, and tenant context.

        The test script saves `user_id` (identifier string) and `tenant_id` to the active environment. Pass `tenant_id` as a query parameter to scope the request.
  /v1/auth/logout:
    post:
      summary: Logout (Tenant)
      responses: {}
      tags:
        - Central
        - Auth
      description: |-
        Revoke the current Bearer access token for a tenant user.

        After logout the `access_token` is invalidated. Pass `tenant_id` to ensure the correct tenant context is used for token revocation.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_id:
                  type: string
            example:
              tenant_id: "{{tenant_id}}"
  /v1/tenants:
    get:
      summary: List Tenants
      parameters:
        - name: page
          in: query
          description: "Page number (min: 1)"
          schema:
            type: integer
          example: 1
        - name: per_page
          in: query
          description: "Items per page (max: 100)"
          schema:
            type: integer
          example: 15
        - name: search
          in: query
          description: Full-text search term
          schema:
            type: string
          example: ""
        - name: sort_by
          in: query
          description: Sort column
          schema:
            type: string
          example: created_at
        - name: sort_order
          in: query
          description: asc | desc
          schema:
            type: string
          example: desc
        - name: show_deleted
          in: query
          description: "Include soft-deleted: 0|1"
          schema:
            type: integer
          example: 0
      responses: {}
      tags:
        - Central
        - Tenants
      description: |-
        Retrieve a paginated list of tenants.

        Supports filtering via `search`, sorting via `sort_by`/`sort_order`, and pagination via `page`/`per_page` (max 100 per page). Pass `show_deleted=1` to include soft-deleted records.
    post:
      summary: Create Tenant
      responses: {}
      tags:
        - Central
        - Tenants
      description: |-
        Create a new tenant record.

        On success the `identifier` of the new record is automatically saved to `{{tenant_id}}` in the active environment via the post-response test script.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                owner_id:
                  type: string
                domain:
                  type: string
                country_id:
                  type: integer
                data_center:
                  type: string
                status:
                  type: string
            example:
              name: Pinnacle Audit Partners
              owner_id: "{{user_id}}"
              domain: pinnacleaudit.aias.app
              country_id: 1
              data_center: us-east-1
              status: active
  "/v1/tenants/{tenant_id}":
    get:
      summary: Get Tenant
      responses: {}
      tags:
        - Central
        - Tenants
      description: |-
        Retrieve a single tenant by its `identifier` string.

        Replace `{{tenant_id}}` with the identifier saved after creation.
    parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
        example: "{{tenant_id}}"
    put:
      summary: Update Tenant
      responses: {}
      tags:
        - Central
        - Tenants
      description: |-
        Update an existing tenant record.

        Send only the fields you want to change — all fields are optional on update. Replace `{{tenant_id}}` with the identifier of the record to update.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                owner_id:
                  type: string
                domain:
                  type: string
                country_id:
                  type: integer
                data_center:
                  type: string
                status:
                  type: string
            example:
              name: Pinnacle Audit Partners
              owner_id: "{{user_id}}"
              domain: pinnacleaudit.aias.app
              country_id: 1
              data_center: us-east-1
              status: active
    delete:
      summary: Delete Tenant
      responses: {}
      tags:
        - Central
        - Tenants
      description: "Soft-delete a tenant record. The record is not permanently removed. Restore it with the corresponding `POST /tenants/{{tenant_id}}/restore` request."
  "/v1/tenants/{tenant_id}/users":
    post:
      summary: Create Tenant User
      responses: {}
      tags:
        - Central
        - Tenants
      description: |-
        Create a new user account scoped to this tenant and assign them a role.

        The user is created in the tenant's isolated database. `role` is **required** and must be one of: `tenant`, `auditor`, `client`, `viewer`.

        Required fields: `first_name`, `last_name`, `username` (unique within tenant), `email` (unique within tenant), `password` (min 8 chars, letters + numbers), `role`.

        Optional: `title`, `middle_name`, `country_code`, `phone`, `preferred_timezone`, `office_location`, `avatar`, `notes`, `is_active`.

        On success the user `identifier` is saved to `{{tenant_user_id}}` in the active environment.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                first_name:
                  type: string
                middle_name:
                  type: string
                last_name:
                  type: string
                username:
                  type: string
                email:
                  type: string
                  format: email
                country_code:
                  type: string
                  format: utc-millisec
                phone:
                  type: string
                  format: utc-millisec
                password:
                  type: string
                preferred_timezone:
                  type: string
                office_location:
                  type: string
                is_active:
                  type: boolean
                role:
                  type: string
            example:
              title: Ms
              first_name: Jane
              middle_name: ""
              last_name: Auditor
              username: jane.auditor
              email: jane.auditor@pinnacleaudit.test
              country_code: "+254"
              phone: 0712345678
              password: Password123!
              preferred_timezone: Africa/Nairobi
              office_location: "Nairobi, Kenya"
              is_active: true
              role: auditor
    parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
        example: "{{tenant_id}}"
  /v1/continents:
    get:
      summary: List Continents
      parameters:
        - name: page
          in: query
          description: "Page number (min: 1)"
          schema:
            type: integer
          example: 1
        - name: per_page
          in: query
          description: "Items per page (max: 100)"
          schema:
            type: integer
          example: 15
        - name: search
          in: query
          description: Full-text search term
          schema:
            type: string
          example: ""
        - name: sort_by
          in: query
          description: Sort column
          schema:
            type: string
          example: created_at
        - name: sort_order
          in: query
          description: asc | desc
          schema:
            type: string
          example: desc
        - name: show_deleted
          in: query
          description: "Include soft-deleted: 0|1"
          schema:
            type: integer
          example: 0
      responses: {}
      tags:
        - Central
        - Continents
      description: |-
        Retrieve a paginated list of continents.

        Supports filtering via `search`, sorting via `sort_by`/`sort_order`, and pagination via `page`/`per_page` (max 100 per page). Pass `show_deleted=1` to include soft-deleted records.
    post:
      summary: Create Continent
      responses: {}
      tags:
        - Central
        - Continents
      description: |-
        Create a new continent record.

        On success the `identifier` of the new record is automatically saved to `{{continent_id}}` in the active environment via the post-response test script.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
                short_code:
                  type: string
                iso_code:
                  type: string
                status:
                  type: boolean
            example:
              name: Africa
              slug: africa
              short_code: AF
              iso_code: AF
              status: true
  "/v1/continents/{continent_id}":
    get:
      summary: Get Continent
      responses: {}
      tags:
        - Central
        - Continents
      description: |-
        Retrieve a single continent by its `identifier` string.

        Replace `{{continent_id}}` with the identifier saved after creation.
    parameters:
      - name: continent_id
        in: path
        required: true
        schema:
          type: string
        example: "{{continent_id}}"
    put:
      summary: Update Continent
      responses: {}
      tags:
        - Central
        - Continents
      description: |-
        Update an existing continent record.

        Send only the fields you want to change — all fields are optional on update. Replace `{{continent_id}}` with the identifier of the record to update.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
                short_code:
                  type: string
                iso_code:
                  type: string
                status:
                  type: boolean
            example:
              name: Africa
              slug: africa
              short_code: AF
              iso_code: AF
              status: true
    delete:
      summary: Delete Continent
      responses: {}
      tags:
        - Central
        - Continents
      description: "Soft-delete a continent record. The record is not permanently removed. Restore it with the corresponding `POST /continents/{{continent_id}}/restore` request."
  "/v1/continents/{continent_id}/restore":
    post:
      summary: Restore Continent
      responses: {}
      tags:
        - Central
        - Continents
      description: Restore a soft-deleted continent record.
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example: {}
    parameters:
      - name: continent_id
        in: path
        required: true
        schema:
          type: string
        example: "{{continent_id}}"
  /v1/countries:
    get:
      summary: List Countries
      parameters:
        - name: page
          in: query
          description: "Page number (min: 1)"
          schema:
            type: integer
          example: 1
        - name: per_page
          in: query
          description: "Items per page (max: 100)"
          schema:
            type: integer
          example: 15
        - name: search
          in: query
          description: Full-text search term
          schema:
            type: string
          example: ""
        - name: sort_by
          in: query
          description: Sort column
          schema:
            type: string
          example: created_at
        - name: sort_order
          in: query
          description: asc | desc
          schema:
            type: string
          example: desc
        - name: show_deleted
          in: query
          description: "Include soft-deleted: 0|1"
          schema:
            type: integer
          example: 0
      responses: {}
      tags:
        - Central
        - Countries
      description: |-
        Retrieve a paginated list of countries.

        Supports filtering via `search`, sorting via `sort_by`/`sort_order`, and pagination via `page`/`per_page` (max 100 per page). Pass `show_deleted=1` to include soft-deleted records.
    post:
      summary: Create Country
      responses: {}
