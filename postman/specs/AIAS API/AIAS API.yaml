            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
                continent_id:
                  type: integer
                short_code:
                  type: string
                iso_code:
                  type: string
                currency:
                  type: string
                currency_name:
                  type: string
                currency_sign:
                  type: string
                country_code:
                  type: string
                  format: utc-millisec
                phone_digits:
                  type: integer
                status:
                  type: boolean
            example:
              name: Kenya
              slug: kenya
              continent_id: 1
              short_code: KE
              iso_code: KE
              currency: KES
              currency_name: Kenyan Shilling
              currency_sign: KSh
              country_code: "+254"
              phone_digits: 9
              status: true
